# After editing this file, regenerate the mermaid graph:
#   nix run ./padi#render-mermaid -- do.yaml --update
#
# MCP-driven execution: the workflow server serves steps one at a time;
# the agent calls workflow_complete(evidence) to advance.
version: 1

include:
  - path: ./police.yaml
    on:
      done: fmt
      fix: police # re-review after fix (pre-commit loop)
  - path: ./ci.yaml
    on:
      done: update-pr

defaults:
  max_visits: 1

entry_points:
  default: sync
  polish: police
  ci-only: ci
  post-implement: fmt
  followup: implement

nodes:
  sync:
    prompt: "Run: git fetch origin && git remote set-head origin --auto"
    description: Fetch latest remote refs
    on:
      default: understand

  understand:
    prompt: |
      Research the task. If input is a GitHub issue URL, fetch with gh issue view.
      Use Grep, Glob, Read, Explore subagents. Never assume — read the code.
      If external tools/libraries are involved, use WebSearch/WebFetch.
    description: Research task and codebase
    on:
      default: hickey

  hickey:
    prompt: |
      Evaluate the planned approach for structural simplicity using
      Rich Hickey's "Simple Made Easy" framework. Invoke the hickey skill.
      Identify concerns, check for complecting, suggest simplifications.
    description: Evaluate approach for structural simplicity
    on:
      default: branch

  branch:
    prompt: |
      Detect the default branch via: git symbolic-ref refs/remotes/origin/HEAD
      Create a descriptive feature branch from that origin/<default> ref.
      Create an empty commit: git commit --allow-empty -m "chore: open PR"
      Push the branch. Open a draft PR with gh pr create --draft.
      Include a progress checklist in the PR body.
    description: Branch + draft PR
    on:
      default: implement

  implement:
    prompt: |
      Implement the planned changes. Stay focused on what was asked.
      Prefer simplicity. Do the boring obvious thing.
    description: Write the code
    on:
      default: e2e

  e2e:
    prompt: |
      Add or update e2e tests covering the change.
      Run just test-quick to verify they pass.
    description: Add/update e2e tests
    on:
      default: police

  # police and police-fix are included from ./police.yaml
  # police reviews uncommitted changes; fix loop stays pre-commit

  fmt:
    prompt: "Run: just fmt"
    description: Auto-format
    on:
      default: commit

  commit:
    prompt: |
      Create a NEW commit (never amend) with a conventional commit message.
      Push to the PR branch.
    description: Commit and push
    on:
      default: test

  test:
    prompt: |
      Run only the e2e tests relevant to the code paths changed in this PR.
      Use git diff master...HEAD --name-only to identify changed files,
      then run just test-quick with only the matching .feature files
      (e.g. just test-quick features/worktree.feature).
      If changes are purely server-internal with no UI impact, unit tests
      may suffice — skip e2e if no relevant scenarios exist.
    max_visits: 4
    description: Targeted e2e tests
    on:
      "failed": test-fix
      default: ci

  test-fix:
    prompt: |
      Analyze the test failure. If flaky, re-run without changes.
      If real: fix the issue, run just fmt, create a NEW commit, push.
    max_visits: 3
    description: Fix or retry test failures
    on:
      default: test

  # ci and ci-fix are included from ./ci.yaml

  update-pr:
    prompt: |
      Re-check the PR title/body against current scope.
      If scope changed, update via gh pr edit.
    description: Update PR if needed
    on:
      default: docs

  docs:
    prompt: |
      Check if README.md and CLAUDE.md are still accurate.
      Compare against files changed in this PR.
    max_visits: 3
    description: Verify docs are up to date
    on:
      "docs outdated": docs-fix
      default: done

  docs-fix:
    prompt: |
      Update outdated documentation. Only fix stale sections.
      Run just fmt. Create a NEW commit. Push.
    max_visits: 3
    description: Fix outdated docs
    on:
      default: docs

  done:
    prompt: Report the PR URL and a brief summary of what was delivered.
    description: Report completion
