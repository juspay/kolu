# Code quality gate. Reusable across projects.

ports:
  # No violations found — review passed
  clean:
  # Violations found and fixed — parent handles fmt/commit
  fixed:

rules:
  - id: tanstack-use-loading-state
    rule: |
      Never check `.data === undefined` as a proxy for loading —
      use TanStack Query's `.isLoading` or `.isPending`.
    rationale: |
      Conflates "loading" with "no data" and misses error states.

  - id: no-query-wrapper-accessors
    rule: |
      Don't wrap query properties in accessor functions —
      export the query object directly.
    rationale: |
      Wrapper accessors like `() => query.isLoading` add indirection
      without value; the query object is already reactive in SolidJS.

  - id: dry-rule-of-three
    rule: |
      Two similar instances are fine — don't abstract prematurely.
      Three is the threshold for extraction. But identical content
      that must stay in sync (same HTML, same version string) should
      be deduplicated immediately regardless of count.
      Versions, ports, paths — define once, reference everywhere.

  - id: invalid-states-unrepresentable
    rule: |
      Use discriminated unions, not booleans or stringly-typed fields.
      If two fields can't both be `undefined` at the same time,
      model that in the type.

  - id: no-dead-code
    rule: |
      Aggressively remove unused code. No commented-out blocks,
      no "just in case" leftovers.

  - id: no-silent-error-swallowing
    rule: |
      Never silently swallow errors. Empty `catch {}` blocks, bare
      `catch: pass`, and `|| true` hide failures. At minimum, log
      the error. If the catch is intentional (best-effort operation),
      add a comment explaining *why* the error is safe to ignore.
    rationale: |
      Silent swallowing masks bugs — failures disappear without a trace,
      making debugging impossible. A logged warning costs nothing; a
      swallowed error costs hours.

  - id: comments-why-not-what
    rule: |
      Add comments where the _why_ isn't obvious from the code.
      Don't comment the _what_. Also comment where the _what_
      isn't obvious — non-obvious guards, CSS workarounds,
      platform-specific behavior. Non-obvious workarounds (temp
      files, wrapper scripts, env var shims) must have a comment
      explaining why they exist.

nodes:
  police:
    prompt: |
      Review the current changes against every rule below. Scope to
      changes in the current branch only.

      Run three passes in order:
      1. Rule checklist — present a table for every rule
      2. Fact-check — audit for correctness and rigor
      3. Elegance — invoke the /elegance skill

      Rules:
      {{rules}}
    max_visits: 3
    description: Code review
    on:
      "violations or issues found": police-fix
      default: :clean

  police-fix:
    prompt: Fix the violations/issues found by code-police.
    description: Fix police violations
    on:
      default: :fixed
