# CI loop: run CI, fix failures, retry.
# Reusable — include from any workflow that needs a CI gate.
#
# Ports:
#   done — CI passed (or ci-fix decided to move on).
#          Includer wires this to whatever comes after CI.
#
# Entry: "ci" node (parent edges target it directly).

ports:
  done:

nodes:
  ci:
    prompt: "Run: just ci (in background)"
    max_visits: 20
    description: Run CI
    on:
      "failed": ci-fix
      default: :done

  ci-fix:
    prompt: |
      Read CI failure output. For flaky failures, retry with just ci::<step>.
      For real bugs: fix, run just fmt, create a NEW commit, push.
    max_visits: 5
    description: Analyze and fix/retry CI failure
    on:
      "fixed with new commit": ci
      default: :done
