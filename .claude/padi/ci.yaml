# CI loop: run CI, analyze failures, retry or fix.
# Reusable — include from any workflow that needs a CI gate.

ports:
  # CI passed
  done:
  # Real bug found and fixed — parent handles fmt/commit/push
  fixed:

nodes:
  ci:
    prompt: "Run: just ci (in background)"
    max_visits: 20
    description: Run CI
    on:
      "failed": ci-triage
      default: :done

  ci-triage:
    prompt: |
      Read the CI failure output. Determine: is this a flaky failure
      (non-deterministic, timing-related, pre-existing) or a real bug?
    max_visits: 5
    description: Classify CI failure
    on:
      "flaky": ci-retry
      "real bug": ci-fix
      default: ci-retry

  ci-retry:
    prompt: |
      Re-run just the failing step(s) with just ci::<step>.
      Do NOT create a commit.
    max_visits: 5
    description: Retry flaky CI step
    on:
      default: ci

  ci-fix:
    prompt: Fix the bug causing the CI failure.
    max_visits: 5
    description: Fix real CI bug
    on:
      default: :fixed
