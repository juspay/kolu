# After editing this file, regenerate the mermaid graph:
#   .claude/workflows/render-mermaid.sh do.yaml --update
version: 1

defaults:
  max_visits: 1

entry_points:
  default: sync
  polish: police
  ci-only: ci
  post-implement: fmt

nodes:
  sync:
    run: "git fetch origin && git pull --ff-only"
    description: Fast-forward to latest remote
    on:
      default: understand

  understand:
    prompt: |
      Research the task. If input is a GitHub issue URL, fetch with gh issue view.
      Use Grep, Glob, Read, Explore subagents. Never assume — read the code.
      If external tools/libraries are involved, use WebSearch/WebFetch.
    description: Research task and codebase
    on:
      default: hickey

  hickey:
    skill: hickey
    description: Evaluate approach for structural simplicity
    on:
      default: branch

  branch:
    prompt: |
      Create a descriptive feature branch from master.
      Push the branch. Load the github-pr skill via the Skill tool.
      Open a draft PR with gh pr create --draft.
      Include a progress checklist in the PR body — one `- [ ] <node-id>: <description>` line
      per happy-path node (from the list computed in Setup step 5). Check off nodes that
      are already complete (sync, understand, hickey, branch) with `- [x]`.
      After PR creation, write artifacts to .workflow-runs/PR-<num>/:
        mkdir -p .workflow-runs/PR-<num>
        Write plan.md and summary.md (with retroactive entries for
        sync, understand, hickey, and branch).
      These files are gitignored — do NOT commit them.
    description: Branch + draft PR
    on:
      default: implement

  implement:
    prompt: |
      Implement the planned changes. Stay focused on what was asked.
      Prefer simplicity. Do the boring obvious thing.
    description: Write the code
    on:
      default: e2e

  e2e:
    prompt: |
      Add or update e2e tests covering the change.
      Run just test-quick to verify they pass.
    description: Add/update e2e tests
    on:
      default: fmt

  fmt:
    run: just fmt
    description: Auto-format
    on:
      default: commit

  commit:
    prompt: |
      Create a NEW commit (never amend) with a conventional commit message.
      Push to the PR branch.
    description: Commit and push
    on:
      default: police

  police:
    skill: code-police
    max_visits: 3
    description: Code quality + fact-check + elegance review
    on:
      "violations or issues found": police-fix
      default: test

  police-fix:
    prompt: |
      Fix the violations/issues found by code-police.
      Run just fmt. Create a NEW commit. Push.
    max_visits: 3
    description: Fix police violations
    on:
      default: police

  test:
    run: just test-quick
    max_visits: 4
    description: Quick e2e tests
    on:
      "failed": test-fix
      default: ci

  test-fix:
    prompt: |
      Analyze the test failure. If it looks flaky (non-deterministic,
      timing-related), just re-run without changes.
      If real: fix the issue, run just fmt, create a NEW commit, push.
    max_visits: 3
    description: Fix or retry test failures
    on:
      default: test

  ci:
    run: just ci
    max_visits: 5
    description: Run CI (background)
    on:
      "failed": ci-fix
      default: update-pr

  ci-fix:
    prompt: |
      Read the CI failure output carefully. Fix the issue.
      Run just fmt. Create a NEW commit. Push.
    max_visits: 5
    description: Fix CI failure
    on:
      default: ci

  update-pr:
    prompt: |
      Re-check the PR title/body against current scope.
      If scope changed, load the github-pr skill and update via gh pr edit.
    description: Update PR if needed
    on:
      default: done

  done:
    prompt: Report the PR URL and a brief summary of what was delivered.
    description: Report completion
