packages:
  - packages/**

# @pierre/trees and @pierre/diffs declare react/react-dom as peer deps but only
# need them for their /react entry points. Kolu consumes the vanilla classes
# directly from SolidJS, so these are optional.
packageExtensions:
  "@pierre/trees":
    peerDependenciesMeta:
      react:
        optional: true
      react-dom:
        optional: true
  "@pierre/diffs":
    peerDependenciesMeta:
      react:
        optional: true
      react-dom:
        optional: true
  # @opentui/core declares web-tree-sitter as a peer only for its <code>/<markdown>
  # syntax-highlighting renderables, which arivu-tui (the only OpenTUI consumer)
  # does not use — so it's optional, not a missing dep.
  "@opentui/core":
    peerDependenciesMeta:
      web-tree-sitter:
        optional: true
