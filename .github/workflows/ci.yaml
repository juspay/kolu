name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  # Git identity for tests that create commits (git.test.ts worktree tests)
  GIT_AUTHOR_NAME: CI
  GIT_AUTHOR_EMAIL: ci@localhost
  GIT_COMMITTER_NAME: CI
  GIT_COMMITTER_EMAIL: ci@localhost

jobs:
  local-checks:
    runs-on: x86_64-linux
    steps:
      - uses: actions/checkout@v4
      - run: just ci::fmt ci::typecheck ci::unit ci::apm-sync

  nix:
    runs-on: ${{ matrix.system }}
    strategy:
      matrix:
        system: [x86_64-linux, aarch64-darwin]
    steps:
      - uses: actions/checkout@v4
      - run: just ci::nix

  e2e:
    needs: nix
    runs-on: ${{ matrix.system }}
    strategy:
      matrix:
        system: [x86_64-linux, aarch64-darwin]
    steps:
      - uses: actions/checkout@v4
      # Playwright's bundled Chromium needs a virtual framebuffer on headless Linux
      - name: Start Xvfb
        if: runner.os == 'Linux'
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
      - run: just ci::e2e

  home-manager:
    needs: nix
    runs-on: x86_64-linux
    steps:
      - uses: actions/checkout@v4
      - run: just ci::home-manager
