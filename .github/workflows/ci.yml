name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  # Vira (https://vira.nixos.asia) runs nix builds on self-hosted runners
  # and posts commit statuses. Wait for it before running e2e tests.
  wait-for-vira:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: autotelic/action-wait-for-status-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          statusName: signoff/vira/x86_64-linux
          timeoutSeconds: 3600
  e2e:
    needs: [wait-for-vira]
    if: always() && (needs.wait-for-vira.result == 'success' || needs.wait-for-vira.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nixbuild/nix-quick-install-action@v34
      - name: Build app (nix)
        run: nix build --accept-flake-config
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        working-directory: tests
        run: npm install
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('tests/package-lock.json') }}
      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        working-directory: tests
        run: npx playwright test
