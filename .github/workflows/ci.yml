name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  wait-for-vira:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vira signoff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          REPO="${{ github.repository }}"
          echo "Waiting for signoff/vira/* statuses on $SHA..."
          for i in $(seq 1 120); do
            STATUSES=$(gh api "repos/$REPO/commits/$SHA/statuses" --jq '[.[] | select(.context | startswith("signoff/vira/"))] | group_by(.context) | map(sort_by(.updated_at) | last) | map(.state)')
            echo "  attempt $i: $STATUSES"
            # Check if all vira statuses are success
            if echo "$STATUSES" | jq -e 'length > 0 and all(. == "success")' >/dev/null 2>&1; then
              echo "All Vira checks passed!"
              exit 0
            fi
            # Fail fast if any errored/failed
            if echo "$STATUSES" | jq -e 'any(. == "error" or . == "failure")' >/dev/null 2>&1; then
              echo "Vira check failed!"
              exit 1
            fi
            sleep 30
          done
          echo "Timed out waiting for Vira"
          exit 1
  e2e:
    needs: [wait-for-vira]
    if: always() && (needs.wait-for-vira.result == 'success' || needs.wait-for-vira.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nixbuild/nix-quick-install-action@v34
      - name: Build app (nix)
        run: nix build --accept-flake-config
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps & browsers
        working-directory: tests
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run e2e tests
        working-directory: tests
        run: npx playwright test
