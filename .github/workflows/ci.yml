name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  build:
    strategy:
      matrix:
        os: [x86_64-linux, aarch64-darwin]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: nix run github:juspay/vira -- ci
  e2e:
    runs-on: x86_64-linux
    steps:
      - uses: actions/checkout@v4
      - run: just test
