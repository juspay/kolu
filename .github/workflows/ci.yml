name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  build:
    strategy:
      matrix:
        os:
          - x86_64-linux
          - aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: nix run github:juspay/vira -- ci
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nixbuild/nix-quick-install-action@v34
      - name: Build app (nix)
        run: nix build
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps & browsers
        working-directory: tests
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run e2e tests
        working-directory: tests
        run: npx playwright test
