<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title">
  <title id="title">odu — a CI runner you attach to</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#16233a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- tile -->
  <rect x="8" y="8" width="496" height="496" rx="116" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="116" fill="url(#glow)"/>
  <rect x="11" y="11" width="490" height="490" rx="113" fill="none"
        stroke="#2dd4bf" stroke-opacity="0.22" stroke-width="3"/>

  <!-- wordmark: a shell prompt you attach to -->
  <text x="86" y="268" font-size="76" fill="#475569"
        font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', SFMono-Regular, Menlo, Consolas, monospace">$</text>
  <text x="148" y="282" font-size="148" font-weight="700" fill="#e8edf4" letter-spacing="2"
        font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', SFMono-Regular, Menlo, Consolas, monospace">odu</text>

  <!-- the live pipeline: ok → ok → running -->
  <line x1="170" y1="368" x2="246" y2="368" stroke="#334155" stroke-width="7" stroke-linecap="round"/>
  <line x1="266" y1="368" x2="342" y2="368" stroke="#334155" stroke-width="7" stroke-linecap="round"/>
  <circle cx="156" cy="368" r="15" fill="#34d399"/>
  <circle cx="256" cy="368" r="15" fill="#34d399"/>
  <circle cx="356" cy="368" r="15" fill="#fbbf24"/>
  <circle cx="356" cy="368" r="26" fill="none" stroke="#fbbf24" stroke-opacity="0.45" stroke-width="4"/>

  <!-- ஓடு — Tamil "run" -->
  <text x="256" y="452" text-anchor="middle" font-size="46" fill="#7da2b8"
        font-family="'Noto Sans Tamil', 'Tamil MN', 'Tamil Sangam MN', Latha, sans-serif">ஓடு</text>
</svg>
