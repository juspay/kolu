<!doctype html>
<!-- `dark`: the shared `@kolu/theme` palette ships its DARK values as the
     `@theme` default and overrides to light under `:root:not(.dark)`, so the
     dark monospace dashboard carries `dark` to keep the dark token values
     (`--color-alert` violet, etc.) the agent-state pips + labels resolve. -->
<html lang="en" class="h-full dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>pulam-web — every agent, every host</title>
    <!-- PWA wiring (the kolu twin): a maskable-capable icon set + the dynamic
         `/manifest.webmanifest` the server emits (`installPwaManifest`) make the
         fleet dashboard installable; the `apple-touch-icon` is iOS's home-screen
         glyph. The manifest is served by the Node backend, not a static file, so
         it stays one source of truth with the server's PWA identity. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- The dark monospace document chrome is Tailwind utilities on <body>
         (utilities-only styling, no custom CSS) — index.css owns the Tailwind
         import plus the shared `@kolu/theme` palette and the `@kolu/solid-statepip`
         source scan. `h-full` on both <html> and <body> makes the canvas full-height. -->
  </head>
  <body class="m-0 h-full bg-[#0b0d10] font-mono text-[#d7dbe0]">
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
