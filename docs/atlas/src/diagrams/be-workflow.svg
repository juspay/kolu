<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1500 1320" font-family="ui-sans-serif, system-ui, sans-serif" role="img"
     aria-label="The /be workflow: one interview up front, then autonomous — set up, implement test-first, open a draft PR, run the four-reviewer serial gauntlet, ship CI and evidence in parallel on a pu box, then report and self-improve. Every skill node links to its SKILL.md on GitHub.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6472"/>
    </marker>
    <marker id="arrowSerial" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0,0 L10,5 L0,10 z" fill="#b5316f"/>
    </marker>
    <style>
      .phase   { stroke-width:2; }
      .pnum    { font-size:13px; font-weight:700; fill:#ffffff; }
      .ptitle  { font-size:19px; font-weight:700; fill:#11203a; }
      .psub    { font-size:12.5px; fill:#6b7280; }
      .chip    { fill:#F7F8FE; stroke:#c9d2f5; stroke-width:1; }
      .skill   { font-size:13.5px; font-weight:700; fill:#0D32B2; }
      .skilln  { font-size:11px; fill:#6b7280; }
      .tool    { font-size:13.5px; font-weight:700; fill:#11203a; }
      .flow    { stroke:#5b6472; stroke-width:2; fill:none; }
      .link    { stroke:#b6bdc9; stroke-width:1.4; fill:none; }
      .serial  { stroke:#b5316f; stroke-width:2.2; fill:none; }
      .ttl     { font-size:30px; font-weight:800; fill:#11203a; }
      .ttlsub  { font-size:14.5px; fill:#6b7280; }
      a:hover .chip { stroke:#0D32B2; stroke-width:1.8; }
      a { cursor:pointer; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="1320" fill="#ffffff"/>

  <!-- ============ Title ============ -->
  <text class="ttl"    x="60" y="54">/be — kolu's autonomous build pipeline</text>
  <text class="ttlsub" x="62" y="80">One interview up front, then fully autonomous to a shipped, reviewed PR.  Every blue node is a skill — click it to open its SKILL.md on GitHub.</text>

  <!-- ============ Spine flow arrows ============ -->
  <path class="flow" d="M540,154 L540,192" marker-end="url(#arrow)"/>
  <path class="flow" d="M540,264 L540,302" marker-end="url(#arrow)"/>
  <path class="flow" d="M540,374 L540,412" marker-end="url(#arrow)"/>
  <path class="flow" d="M540,484 L540,522" marker-end="url(#arrow)"/>
  <path class="flow" d="M540,738 L540,798" marker-end="url(#arrow)"/>
  <path class="flow" d="M540,1058 L540,1118" marker-end="url(#arrow)"/>

  <!-- ============ §0 Interview ============ -->
  <rect class="phase" x="330" y="88" width="420" height="66" rx="12" fill="#fdf3e3" stroke="#b76e00"/>
  <circle cx="356" cy="121" r="13" fill="#b76e00"/>
  <text class="pnum"   x="356" y="125" text-anchor="middle">0</text>
  <text class="ptitle" x="380" y="116">Interview — the differentiator</text>
  <text class="psub"   x="380" y="138">the one &amp; only place /be asks you anything</text>

  <!-- AskUserQuestion (built-in tool, no link) -->
  <path class="link" d="M750,121 L800,121"/>
  <rect class="chip" x="800" y="94" width="340" height="54" rx="8"/>
  <text class="tool"   x="818" y="116">AskUserQuestion  (batched, once)</text>
  <text class="skilln" x="818" y="135">Plan first?  ·  Task kind  ·  Ultracode?</text>

  <!-- ============ §1 Set up ============ -->
  <rect class="phase" x="330" y="192" width="420" height="72" rx="12" fill="#E3E9FD" stroke="#0D32B2"/>
  <circle cx="356" cy="228" r="13" fill="#0D32B2"/>
  <text class="pnum"   x="356" y="232" text-anchor="middle">1</text>
  <text class="ptitle" x="380" y="221">Set up</text>
  <text class="psub"   x="380" y="242">git fetch · branch off origin/HEAD · read .agency/do.md</text>
  <text class="psub"   x="380" y="258">feature branch only — never commit to master</text>

  <a xlink:href="https://github.com/juspay/kolu/blob/master/.apm/skills/atlas/SKILL.md" target="_blank" rel="noopener">
    <path class="link" d="M750,228 L800,228"/>
    <rect class="chip" x="800" y="204" width="340" height="50" rx="8"/>
    <text class="skill"  x="818" y="226">/atlas</text>
    <text class="skilln" x="818" y="244">plan-of-record note (optional · "plan first")</text>
  </a>

  <!-- ============ §2 Implement ============ -->
  <rect class="phase" x="330" y="302" width="420" height="72" rx="12" fill="#EAF6EC" stroke="#2f8132"/>
  <circle cx="356" cy="338" r="13" fill="#2f8132"/>
  <text class="pnum"   x="356" y="342" text-anchor="middle">2</text>
  <text class="ptitle" x="380" y="331">Implement — test-first</text>
  <text class="psub"   x="380" y="352">repro red→green (bug) · cover (feature) · sync docs</text>
  <text class="psub"   x="380" y="368">honor design philosophy · changelog · check + fmt</text>

  <path class="link" d="M750,338 L800,338"/>
  <a xlink:href="https://github.com/juspay/kolu/blob/master/.apm/skills/test/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="800" y="302" width="160" height="32" rx="8"/>
    <text class="skill" x="816" y="323">/test</text>
  </a>
  <a xlink:href="https://github.com/juspay/kolu/blob/master/.apm/skills/dev-server/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="968" y="302" width="172" height="32" rx="8"/>
    <text class="skill" x="984" y="323">/dev-server</text>
  </a>
  <a xlink:href="https://github.com/juspay/skills/blob/main/skills/nix-typescript/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="800" y="342" width="160" height="32" rx="8"/>
    <text class="skill" x="816" y="363">/nix-typescript</text>
  </a>
  <a xlink:href="https://github.com/juspay/project-unknown/blob/main/.apm/skills/pu/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="968" y="342" width="172" height="32" rx="8"/>
    <text class="skill" x="984" y="363">/pu  (heavy work)</text>
  </a>

  <!-- ============ §3 Open PR ============ -->
  <rect class="phase" x="330" y="412" width="420" height="72" rx="12" fill="#f0eafb" stroke="#6b3fb5"/>
  <circle cx="356" cy="448" r="13" fill="#6b3fb5"/>
  <text class="pnum"   x="356" y="452" text-anchor="middle">3</text>
  <text class="ptitle" x="380" y="441">Open the PR (draft)</text>
  <text class="psub"   x="380" y="462">before any review — findings land on a real PR</text>
  <text class="psub"   x="380" y="478">backfill changelog link · finalize plan note</text>

  <path class="link" d="M750,448 L800,448"/>
  <a xlink:href="https://github.com/srid/agency/blob/master/.apm/skills/forge-pr/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="800" y="424" width="160" height="48" rx="8"/>
    <text class="skill" x="816" y="453">/forge-pr</text>
  </a>
  <a xlink:href="https://github.com/juspay/kolu/blob/master/.apm/skills/atlas/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="968" y="424" width="172" height="48" rx="8"/>
    <text class="skill"  x="984" y="446">/atlas</text>
    <text class="skilln" x="984" y="463">status: implemented</text>
  </a>

  <!-- ============ §4 Review gauntlet ============ -->
  <rect class="phase" x="330" y="522" width="420" height="66" rx="12" fill="#fbe9f1" stroke="#b5316f"/>
  <circle cx="356" cy="555" r="13" fill="#b5316f"/>
  <text class="pnum"   x="356" y="559" text-anchor="middle">4</text>
  <text class="ptitle" x="380" y="550">Review gauntlet</text>
  <text class="psub"   x="380" y="572">four reviewers, SERIAL — each sole editor, commits in turn</text>

  <a xlink:href="https://github.com/juspay/kolu/blob/master/.apm/skills/be-review/SKILL.md" target="_blank" rel="noopener">
    <path class="link" d="M750,555 L800,555"/>
    <rect class="chip" x="800" y="531" width="340" height="48" rx="8"/>
    <text class="skill"  x="818" y="553">/be-review</text>
    <text class="skilln" x="818" y="570">orchestrates the four · pushes once · then comments</text>
  </a>

  <!-- gauntlet feeder -->
  <path class="serial" d="M540,588 L540,608 L150,608 L150,636" marker-end="url(#arrowSerial)"/>

  <!-- 4 serial reviewers -->
  <a xlink:href="https://github.com/juspay/kolu/blob/master/.apm/skills/lens-debate/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="50" y="636" width="200" height="56" rx="8" stroke="#b5316f"/>
    <text class="skill"  x="68" y="660">/lens-debate</text>
    <text class="skilln" x="68" y="678">boundaries ⇄ simplicity</text>
  </a>
  <path class="serial" d="M250,664 L320,664" marker-end="url(#arrowSerial)"/>
  <a xlink:href="https://github.com/juspay/kolu/blob/master/.apm/skills/codex-debate/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="320" y="636" width="200" height="56" rx="8" stroke="#b5316f"/>
    <text class="skill"  x="338" y="660">/codex-debate</text>
    <text class="skilln" x="338" y="678">codex ⇄ claude, to consensus</text>
  </a>
  <path class="serial" d="M520,664 L590,664" marker-end="url(#arrowSerial)"/>
  <!-- /simplify is a built-in Claude Code skill → links to the docs, not a repo -->
  <a xlink:href="https://docs.claude.com/en/docs/claude-code/slash-commands" target="_blank" rel="noopener">
    <rect class="chip" x="590" y="636" width="200" height="56" rx="8" stroke="#b5316f"/>
    <text class="skill"  x="608" y="660">/simplify</text>
    <text class="skilln" x="608" y="678">reuse · efficiency · altitude</text>
  </a>
  <path class="serial" d="M790,664 L860,664" marker-end="url(#arrowSerial)"/>
  <a xlink:href="https://github.com/srid/agency/blob/master/.apm/skills/code-police/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="860" y="636" width="200" height="56" rx="8" stroke="#b5316f"/>
    <text class="skill"  x="878" y="660">/code-police</text>
    <text class="skilln" x="878" y="678">--no-elegance in gauntlet</text>
  </a>

  <!-- lens sub-lenses -->
  <path class="link" d="M110,692 L110,708"/>
  <path class="link" d="M190,692 L190,708"/>
  <a xlink:href="https://kolu.dev/blog/hickey-lowy" target="_blank" rel="noopener">
    <rect class="chip" x="40" y="708" width="100" height="30" rx="8"/>
    <text class="skill" x="56" y="728">/lowy</text>
  </a>
  <a xlink:href="https://kolu.dev/blog/hickey-lowy" target="_blank" rel="noopener">
    <rect class="chip" x="150" y="708" width="110" height="30" rx="8"/>
    <text class="skill" x="166" y="728">/hickey</text>
  </a>

  <!-- police sub-passes -->
  <path class="link" d="M920,692 L920,708"/>
  <a xlink:href="https://github.com/srid/agency/blob/master/.apm/skills/fact-check/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="860" y="708" width="135" height="30" rx="8"/>
    <text class="skill" x="876" y="728">/fact-check</text>
  </a>
  <rect class="chip" x="1005" y="708" width="170" height="30" rx="8" stroke-dasharray="4 3"/>
  <text class="skilln" x="1021" y="728">elegance — skipped</text>

  <!-- gauntlet return to spine -->
  <path class="serial" d="M1060,664 L1130,664 L1130,762 L540,762 L540,798" marker-end="url(#arrowSerial)"/>

  <!-- performance pass note -->
  <a xlink:href="https://github.com/juspay/kolu/blob/master/.apm/skills/perf-diagnose/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="1180" y="636" width="270" height="56" rx="8"/>
    <text class="skill"  x="1198" y="660">perf pass → atlas/performance</text>
    <text class="skilln" x="1198" y="678">if a perf-sensitive surface changed</text>
  </a>

  <!-- ============ §5 Ship ============ -->
  <rect class="phase" x="330" y="798" width="420" height="66" rx="12" fill="#fbf3df" stroke="#9a6a00"/>
  <circle cx="356" cy="831" r="13" fill="#9a6a00"/>
  <text class="pnum"   x="356" y="835" text-anchor="middle">5</text>
  <text class="ptitle" x="380" y="826">Ship — CI ∥ evidence</text>
  <text class="psub"   x="380" y="848">run concurrently on a pu box · join before Done</text>

  <!-- split into two parallel lanes -->
  <path class="flow" d="M540,864 L540,880 L320,880 L320,904" marker-end="url(#arrow)"/>
  <path class="flow" d="M540,864 L540,880 L900,880 L900,904" marker-end="url(#arrow)"/>

  <!-- CI lane -->
  <rect class="phase" x="120" y="904" width="400" height="120" rx="12" fill="#fcfcfe" stroke="#9a6a00"/>
  <text class="ptitle" x="140" y="934" font-size="16">CI pipeline (backgrounded first)</text>
  <a xlink:href="https://github.com/juspay/odu/blob/master/.apm/skills/ci/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="140" y="948" width="170" height="56" rx="8"/>
    <text class="skill"  x="156" y="972">/ci</text>
    <text class="skilln" x="156" y="990">odu run → settle → rerun</text>
  </a>
  <a xlink:href="https://github.com/juspay/odu/blob/master/.apm/skills/odu-mcp/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="322" y="948" width="180" height="56" rx="8"/>
    <text class="skill"  x="338" y="972">/odu-mcp</text>
    <text class="skilln" x="338" y="990">drive CI via MCP face</text>
  </a>

  <!-- Evidence lane -->
  <rect class="phase" x="700" y="904" width="400" height="120" rx="12" fill="#fcfcfe" stroke="#9a6a00"/>
  <text class="ptitle" x="720" y="934" font-size="16">Evidence (concurrent)</text>
  <a xlink:href="https://github.com/juspay/kolu/blob/master/.apm/skills/evidence/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="720" y="948" width="170" height="56" rx="8"/>
    <text class="skill"  x="736" y="972">/evidence</text>
    <text class="skilln" x="736" y="990">screenshot / video on pu</text>
  </a>
  <a xlink:href="https://github.com/juspay/kolu/blob/master/.apm/skills/dev-server/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="902" y="948" width="180" height="56" rx="8"/>
    <text class="skill"  x="918" y="972">/dev-server</text>
    <text class="skilln" x="918" y="990">venue gate (local vs pu)</text>
  </a>

  <!-- pu underpins ship -->
  <a xlink:href="https://github.com/juspay/project-unknown/blob/main/.apm/skills/pu/SKILL.md" target="_blank" rel="noopener">
    <rect class="chip" x="1140" y="948" width="200" height="56" rx="8"/>
    <text class="skill"  x="1156" y="972">/pu</text>
    <text class="skilln" x="1156" y="990">ephemeral host for both</text>
  </a>
  <path class="link" d="M520,976 L700,976"/>
  <path class="link" d="M1100,976 L1140,976"/>

  <!-- lanes join into Done -->
  <path class="flow" d="M320,1024 L320,1042 L540,1042 L540,1118" marker-end="url(#arrow)"/>
  <path class="flow" d="M900,1024 L900,1042 L540,1042"/>

  <!-- ============ Done ============ -->
  <rect class="phase" x="330" y="1118" width="420" height="68" rx="12" fill="#EAF6EC" stroke="#2f8132"/>
  <circle cx="356" cy="1152" r="13" fill="#2f8132"/>
  <path d="M350,1152 l4,4 l8,-9" stroke="#ffffff" stroke-width="2.4" fill="none"/>
  <text class="ptitle" x="380" y="1146">Done</text>
  <text class="psub"   x="380" y="1167">report PR · gauntlet outcome · CI status</text>
  <text class="psub"   x="380" y="1182">never merge — the human reviews &amp; merges</text>

  <a xlink:href="https://github.com/juspay/kolu/blob/master/.apm/skills/self-improve/SKILL.md" target="_blank" rel="noopener">
    <path class="link" d="M750,1152 L800,1152"/>
    <rect class="chip" x="800" y="1126" width="340" height="52" rx="8"/>
    <text class="skill"  x="818" y="1148">/self-improve  (forked)</text>
    <text class="skilln" x="818" y="1166">mine the session → sharpen the skill-set</text>
  </a>

  <!-- ============ Legend ============ -->
  <g transform="translate(60,1235)">
    <text class="psub" x="0" y="0" font-size="13">Legend:</text>
    <rect class="chip" x="60" y="-13" width="20" height="18" rx="4"/>
    <text class="psub" x="88" y="0" font-size="12.5">skill (links to SKILL.md)</text>
    <line x1="280" y1="-4" x2="320" y2="-4" class="flow" marker-end="url(#arrow)"/>
    <text class="psub" x="330" y="0" font-size="12.5">phase flow</text>
    <line x1="430" y1="-4" x2="470" y2="-4" class="serial" marker-end="url(#arrowSerial)"/>
    <text class="psub" x="480" y="0" font-size="12.5">serial gauntlet</text>
    <line x1="610" y1="-4" x2="650" y2="-4" class="link"/>
    <text class="psub" x="660" y="0" font-size="12.5">attached skill / tool</text>
    <text class="psub" x="840" y="0" font-size="12.5">Autonomy propagates to every subagent · heavy work runs on a pu box.</text>
  </g>
</svg>
