<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 726" font-family="ui-sans-serif, system-ui, sans-serif" role="img" aria-label="How two agents coordinate, drawn as three stacked panels — the same pair of agents A and B, differing only in the channel between them. Panel one, hcom, a coordination fabric: A and B both read and write a shared SQLite event log that holds an inbox, an event feed, and subscriptions; tool hooks deliver messages mid-turn, routed by at-mention, tagged with an intent and isolated by thread. The channel is a solid two-way path through shared state. Panel two, kolu today, one agent screen-scrapes another: A is a driver that types keystrokes into B's PTY with kaval-tui send, then reads B's reply by snapshotting the screen and matching text. The path is one-directional and drawn dashed and red, annotated with kolu's own skill warnings — the write is blind, an Enter races bracketed-paste and is silently dropped, and output going idle does not mean the reply is correct. Panel three, kolu proposed, a message surface beside awareness: A and B exchange messages through a new green surface layer — an inbox collection, a messages Event, and subscriptions — sitting atop the existing blue awareness surface that already tracks git, PR, agent state and foreground; messages are delivered as a prompt through the anyagent adapter, folded like awareness, over the same surface-over-ssh transport with no broker. The verdict: adopt hcom's channel, keep kolu's substrate.">
  <defs>
    <marker id="hk-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#475569"/>
    </marker>
    <marker id="hk-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#b91c1c"/>
    </marker>
    <marker id="hk-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#15803D"/>
    </marker>
    <style>
      .panel   { fill:#ffffff; stroke:#e2e8f0; stroke-width:1.5; }
      .ptitle  { fill:#0f172a; font-size:15px; font-weight:700; }
      .badge   { font-size:10px; font-weight:700; letter-spacing:0.08em; }
      .agent   { fill:#F1F5F9; stroke:#64748b; stroke-width:1.75; }
      .agent-t { fill:#0f172a; font-size:13px; font-weight:700; }
      .agent-s { fill:#64748b; font-size:10.5px; }
      .mono    { font-family:ui-monospace, "SF Mono", Menlo, monospace; }

      .amber-box { fill:#FBF1DC; stroke:#B45309; stroke-width:2; }
      .amber-t   { fill:#92400E; font-size:13px; font-weight:700; }
      .amber-s   { fill:#7a4f00; font-size:10.5px; }
      .amber-badge { fill:#B45309; }

      .red-t   { fill:#b91c1c; font-size:10.5px; font-weight:700; }
      .red-s   { fill:#9f1239; font-size:10px; font-style:italic; }
      .red-badge { fill:#b91c1c; }

      .green-box { fill:#E6F4EA; stroke:#15803D; stroke-width:2; }
      .green-t   { fill:#14532D; font-size:12.5px; font-weight:700; }
      .green-s   { fill:#166534; font-size:10px; }
      .green-badge { fill:#15803D; }
      .blue-box  { fill:#EDF0FD; stroke:#0D32B2; stroke-width:1.75; }
      .blue-t    { fill:#0D32B2; font-size:12px; font-weight:700; }
      .blue-s    { fill:#4A5072; font-size:9.5px; }

      .edge    { stroke:#475569; stroke-width:2.25; fill:none; }
      .edge-red{ stroke:#b91c1c; stroke-width:2.25; fill:none; stroke-dasharray:7 5; }
      .edge-grn{ stroke:#15803D; stroke-width:2.5; fill:none; }
      .elabel  { fill:#475569; font-size:10.5px; font-style:italic; }
    </style>
  </defs>

  <!-- ============ PANEL 1 — hcom ============ -->
  <rect class="panel" x="14" y="14" width="712" height="210" rx="10"/>
  <text class="ptitle" x="34" y="42">hcom — a coordination <tspan font-style="italic">fabric</tspan></text>
  <text class="badge amber-badge" x="692" y="42" text-anchor="end">ADOPT THE CHANNEL</text>

  <rect class="agent" x="40"  y="86" width="120" height="66" rx="8"/>
  <text class="agent-t" x="100" y="115" text-anchor="middle">Agent A</text>
  <text class="agent-s" x="100" y="132" text-anchor="middle">claude</text>

  <rect class="agent" x="580" y="86" width="120" height="66" rx="8"/>
  <text class="agent-t" x="640" y="115" text-anchor="middle">Agent B</text>
  <text class="agent-s" x="640" y="132" text-anchor="middle">codex</text>

  <rect class="amber-box" x="278" y="78" width="184" height="82" rx="8"/>
  <text class="amber-t" x="370" y="104" text-anchor="middle">shared event log</text>
  <text class="amber-s mono" x="370" y="123" text-anchor="middle">SQLite · one file</text>
  <text class="amber-s" x="370" y="140" text-anchor="middle">inbox · events · subscribe</text>

  <path class="edge" d="M160 119 H278" marker-end="url(#hk-arrow)" marker-start="url(#hk-arrow)"/>
  <path class="edge" d="M462 119 H580" marker-end="url(#hk-arrow)" marker-start="url(#hk-arrow)"/>
  <text class="elabel" x="370" y="184" text-anchor="middle">hooks deliver mid-turn · @mention routing · intent (request/inform/ack) · threads</text>

  <!-- ============ PANEL 2 — kolu today ============ -->
  <rect class="panel" x="14" y="240" width="712" height="212" rx="10"/>
  <text class="ptitle" x="34" y="268">kolu today — one agent <tspan font-style="italic">screen-scrapes</tspan> another</text>
  <text class="badge red-badge" x="692" y="268" text-anchor="end">THE GAP</text>

  <rect class="agent" x="46"  y="316" width="176" height="78" rx="8"/>
  <text class="agent-t" x="134" y="348" text-anchor="middle">Agent A — driver</text>
  <text class="agent-s" x="134" y="366" text-anchor="middle">the kolu skill loop</text>

  <rect class="agent" x="518" y="316" width="176" height="78" rx="8"/>
  <text class="agent-t" x="606" y="348" text-anchor="middle">Agent B</text>
  <text class="agent-s" x="606" y="366" text-anchor="middle">its live TUI, on a kaval PTY</text>

  <path class="edge-red" d="M222 340 H518" marker-end="url(#hk-red)"/>
  <text class="red-t mono" x="370" y="332" text-anchor="middle">kaval-tui send — type keystrokes into the PTY</text>

  <path class="edge-red" d="M518 372 H222" marker-end="url(#hk-red)"/>
  <text class="red-t mono" x="370" y="390" text-anchor="middle">snapshot --viewport — read pixels off the screen</text>

  <text class="red-s" x="370" y="430" text-anchor="middle">blind write · Enter races bracketed-paste and is dropped · idle ≠ the reply is correct</text>

  <!-- ============ PANEL 3 — kolu proposed ============ -->
  <rect class="panel" x="14" y="468" width="712" height="244" rx="10"/>
  <text class="ptitle" x="34" y="496">kolu proposed — a message surface <tspan font-style="italic">beside</tspan> awareness</text>
  <text class="badge green-badge" x="692" y="496" text-anchor="end">KEEP THE SUBSTRATE</text>

  <rect class="agent" x="40"  y="556" width="120" height="66" rx="8"/>
  <text class="agent-t" x="100" y="585" text-anchor="middle">Agent A</text>
  <text class="agent-s" x="100" y="602" text-anchor="middle">claude</text>

  <rect class="agent" x="580" y="556" width="120" height="66" rx="8"/>
  <text class="agent-t" x="640" y="585" text-anchor="middle">Agent B</text>
  <text class="agent-s" x="640" y="602" text-anchor="middle">codex</text>

  <rect class="green-box" x="258" y="534" width="224" height="52" rx="8"/>
  <text class="green-t" x="370" y="556" text-anchor="middle">message surface (new)</text>
  <text class="green-s mono" x="370" y="573" text-anchor="middle">inbox · messages Event · subscribe</text>

  <rect class="blue-box" x="258" y="592" width="224" height="50" rx="8"/>
  <text class="blue-t" x="370" y="612" text-anchor="middle">awareness surface (exists)</text>
  <text class="blue-s mono" x="370" y="628" text-anchor="middle">git · pr · agent-state · foreground</text>

  <path class="edge-grn" d="M160 589 H258" marker-end="url(#hk-green)" marker-start="url(#hk-green)"/>
  <path class="edge-grn" d="M482 589 H580" marker-end="url(#hk-green)" marker-start="url(#hk-green)"/>
  <text class="elabel" x="370" y="672" text-anchor="middle">delivered as a prompt via the anyagent adapter · folded like awareness</text>
  <text class="elabel" x="370" y="690" text-anchor="middle">same @kolu/surface-over-ssh transport · no broker</text>
</svg>
