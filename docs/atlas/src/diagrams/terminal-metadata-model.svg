<svg viewBox="0 0 880 600" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="v" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#15803d"/></marker>
    <marker id="s" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
  </defs>

  <text x="440" y="24" text-anchor="middle" font-size="14.5" font-weight="700" fill="#334155">two served collections · <tspan fill="#15803d">joined at the reader</tspan> · never fused server-side  <tspan font-size="11" fill="#94a3b8">(landed: PR #1594)</tspan></text>

  <!-- producers -->
  <text x="144" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">kaval — the PTY</text>
  <rect x="28" y="56" width="232" height="92" rx="9" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="44" y="79" font-size="12.5" font-weight="700" fill="#334155">live Entry state</text>
  <text x="44" y="97" font-size="10.5" fill="#475569">cwd · title · foreground · command · exit</text>
  <text x="44" y="113" font-size="9.5" fill="#64748b">OSC 7 / 0;2 / 633;E · tcgetpgrp</text>
  <text x="44" y="132" font-size="9.5" fill="#64748b">(untouched by this PR · feeds the sensors)</text>

  <text x="396" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#b06d12">sensors — @kolu/pulam-library</text>
  <rect x="280" y="56" width="232" height="92" rx="9" fill="#fff6e8" stroke="#d98a1f" stroke-width="1.5"/>
  <text x="296" y="79" font-size="12.5" font-weight="700" fill="#8a5a12">derive + relay</text>
  <text x="296" y="97" font-size="10.5" fill="#7a4f10">git · pr · agent · lastAgentCommand …</text>
  <text x="296" y="113" font-size="9.5" fill="#b07d2a">cwd → git → pr · relay cwd/foreground</text>
  <text x="296" y="132" font-size="9.5" fill="#b07d2a">local endpoint now · pulam at R9</text>

  <text x="736" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#5a3ff0">kolu — the UI author</text>
  <rect x="620" y="56" width="232" height="92" rx="9" fill="#efebff" stroke="#5a3ff0" stroke-width="1.5"/>
  <text x="636" y="79" font-size="12.5" font-weight="700" fill="#3a2bb8">authored, persisted</text>
  <text x="636" y="97" font-size="10.5" fill="#352a7a">location · theme · panels · intent</text>
  <text x="636" y="113" font-size="9.5" fill="#6b5fd0">+ state = active | sleeping · sleptAt</text>

  <line x1="260" y1="100" x2="278" y2="100" stroke="#64748b" stroke-width="1.4" marker-end="url(#s)"/>

  <!-- two served collections -->
  <line x1="396" y1="148" x2="300" y2="208" stroke="#d98a1f" stroke-width="1.5" marker-end="url(#s)"/>
  <line x1="180" y1="148" x2="250" y2="208" stroke="#64748b" stroke-width="1.2" marker-end="url(#s)"/>
  <line x1="736" y1="148" x2="715" y2="208" stroke="#5a3ff0" stroke-width="1.5" marker-end="url(#s)"/>

  <rect x="110" y="210" width="320" height="96" rx="10" fill="#fff6e8" stroke="#d98a1f" stroke-width="1.8"/>
  <text x="270" y="234" text-anchor="middle" font-size="13.5" font-weight="700" fill="#8a5a12">terminalWorkspace.awareness</text>
  <text x="270" y="253" text-anchor="middle" font-size="12" font-weight="700" fill="#7a4f10">AwarenessValue</text>
  <text x="270" y="271" text-anchor="middle" font-size="10" fill="#7a4f10">cwd·git·pr·agent·foreground·lastActivityAt·</text>
  <text x="270" y="285" text-anchor="middle" font-size="10" fill="#7a4f10">lastAgentCommand·agentSession  (8 fields)</text>
  <text x="270" y="300" text-anchor="middle" font-size="9" fill="#b06d12">served raw · single-writer store</text>

  <rect x="560" y="210" width="290" height="96" rx="10" fill="#efebff" stroke="#5a3ff0" stroke-width="1.8"/>
  <text x="705" y="234" text-anchor="middle" font-size="13.5" font-weight="700" fill="#3a2bb8">kolu.authored</text>
  <text x="705" y="253" text-anchor="middle" font-size="12" font-weight="700" fill="#352a7a">AuthoredTerminal</text>
  <text x="705" y="271" text-anchor="middle" font-size="10" fill="#352a7a">location · client chrome ·</text>
  <text x="705" y="285" text-anchor="middle" font-size="10" fill="#352a7a">active | sleeping discriminant</text>
  <text x="705" y="300" text-anchor="middle" font-size="9" fill="#6b5fd0">served raw · names NO awareness field</text>

  <!-- join -->
  <line x1="270" y1="306" x2="360" y2="372" stroke="#15803d" stroke-width="1.6" marker-end="url(#v)"/>
  <line x1="705" y1="306" x2="560" y2="372" stroke="#15803d" stroke-width="1.6" marker-end="url(#v)"/>

  <rect x="225" y="374" width="430" height="128" rx="12" fill="#eefcf2" stroke="#15803d" stroke-width="2"/>
  <text x="440" y="399" text-anchor="middle" font-size="14.5" font-weight="700" fill="#15803d">composeTerminalMetadata(authored, awareness)</text>
  <text x="440" y="419" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">= TerminalMetadata  ·  active | sleeping</text>
  <line x1="250" y1="430" x2="630" y2="430" stroke="#bfe6cd"/>
  <text x="440" y="449" text-anchor="middle" font-size="10.5" fill="#475569">active   → &#123; ...awareness, ...authored &#125;   (full live overlay)</text>
  <text x="440" y="465" text-anchor="middle" font-size="10.5" fill="#475569">sleeping → &#123; ...persisted(awareness), ...authored &#125;   (frozen pr)</text>
  <text x="440" y="487" text-anchor="middle" font-size="10" font-style="italic" fill="#3f9b63">the ONE join — at the READER (useTerminalMetadata) and at SAVE (snapshotSession)</text>

  <!-- two consumers of the join -->
  <text x="250" y="525" text-anchor="middle" font-size="10.5" fill="#5a3ff0">↳ client read · ~20 getMetadata consumers</text>
  <text x="630" y="525" text-anchor="middle" font-size="10.5" fill="#64748b">↳ disk · SavedTerminal (live overlay stripped)</text>

  <!-- footnote -->
  <rect x="40" y="548" width="800" height="44" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.1" stroke-dasharray="5 4"/>
  <text x="440" y="566" text-anchor="middle" font-size="10.5" font-weight="700" fill="#475569">No server-side fused collection.</text>
  <text x="440" y="582" text-anchor="middle" font-size="10" fill="#64748b">`surfaceCtx.collections.terminalMetadata` is a compile error (pinned by surface.test.ts). R9 = swap awareness's backing remote-side behind the same seam.</text>
</svg>
