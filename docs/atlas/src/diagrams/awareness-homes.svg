<svg viewBox="0 0 820 432" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a2bb8"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#15803d"/></marker>
    <marker id="s" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="410" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Same producer, same fold — two transports (local R9.0 · remote R9.3)</text>

  <!-- LOCAL -->
  <rect x="20" y="40" width="362" height="352" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="40" y="58" font-size="11.5" font-weight="700" fill="#64748b">LOCAL (R9.0) — kolu-server</text>

  <rect x="66" y="74" width="270" height="44" rx="9" fill="#fff6e8" stroke="#d98a1f" stroke-width="1.8"/>
  <text x="201" y="93" text-anchor="middle" font-size="12" font-weight="700" fill="#8a5a12">memoryless producer — in-process</text>
  <text x="201" y="109" text-anchor="middle" font-size="9" font-style="italic" fill="#b07d2a">← kaval taps (local socket)</text>

  <rect x="66" y="146" width="270" height="44" rx="9" fill="#eafaf0" stroke="#15803d" stroke-width="1.7"/>
  <text x="201" y="165" text-anchor="middle" font-size="11.5" font-weight="700" fill="#14663a">kolu's fold</text>
  <text x="201" y="181" text-anchor="middle" font-size="9" fill="#14663a">kolu's clock · seeds from its record</text>

  <rect x="66" y="216" width="270" height="44" rx="9" fill="#efebff" stroke="#5a3ff0" stroke-width="1.7"/>
  <text x="201" y="235" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3a2bb8">awareness = HostObservation</text>
  <text x="201" y="251" text-anchor="middle" font-size="9.3" fill="#352a7a">+ memory → kolu.authored</text>

  <rect x="66" y="300" width="270" height="42" rx="9" fill="#f4f1ff" stroke="#5a3ff0" stroke-width="1.5"/>
  <text x="201" y="320" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3a2bb8">browser</text>
  <text x="201" y="335" text-anchor="middle" font-size="9" fill="#352a7a">authored ⋈ awareness</text>

  <line x1="201" y1="118" x2="201" y2="146" stroke="#b06d12" stroke-width="1.6" marker-end="url(#g)"/>
  <line x1="201" y1="190" x2="201" y2="216" stroke="#15803d" stroke-width="1.6" marker-end="url(#g)"/>
  <line x1="201" y1="260" x2="201" y2="300" stroke="#3a2bb8" stroke-width="1.5" marker-end="url(#b)"/>

  <!-- REMOTE -->
  <rect x="438" y="40" width="362" height="352" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="780" y="58" text-anchor="end" font-size="11.5" font-weight="700" fill="#64748b">REMOTE (R9.3)</text>

  <text x="484" y="76" font-size="9.5" font-weight="700" fill="#8a5a12">pulam daemon (degenerate host — no memory)</text>
  <rect x="484" y="82" width="272" height="42" rx="9" fill="#fff6e8" stroke="#d98a1f" stroke-width="1.8"/>
  <text x="620" y="101" text-anchor="middle" font-size="12" font-weight="700" fill="#8a5a12">memoryless producer — SAME</text>
  <text x="620" y="116" text-anchor="middle" font-size="9" font-style="italic" fill="#b07d2a">← remote kaval taps</text>

  <rect x="484" y="148" width="272" height="40" rx="9" fill="#eef2f7" stroke="#64748b" stroke-width="1.6"/>
  <text x="620" y="166" text-anchor="middle" font-size="10.3" font-weight="700" fill="#334155">serve: awarenessEvents stream</text>
  <text x="620" y="180" text-anchor="middle" font-size="9" fill="#475569">HostObservation · snapshot-then-deltas</text>

  <rect x="466" y="270" width="312" height="64" rx="9" fill="#eafaf0" stroke="#15803d" stroke-width="1.7"/>
  <text x="622" y="291" text-anchor="middle" font-size="10.8" font-weight="700" fill="#14663a">kolu: subscribe stream → the SAME fold</text>
  <text x="622" y="308" text-anchor="middle" font-size="9.3" fill="#14663a">kolu's clock · seeds from its record</text>
  <text x="622" y="324" text-anchor="middle" font-size="8.6" font-style="italic" fill="#15803d">snapshot frame IS the reconcile — no reconcileRemoteSnapshot</text>

  <line x1="620" y1="124" x2="620" y2="148" stroke="#b06d12" stroke-width="1.6" marker-end="url(#g)"/>
  <line x1="620" y1="188" x2="620" y2="270" stroke="#15803d" stroke-width="1.7" stroke-dasharray="5 3" marker-end="url(#g)"/>
  <rect x="556" y="216" width="128" height="16" rx="3" fill="#fff"/>
  <text x="620" y="228" text-anchor="middle" font-size="9" font-weight="700" fill="#15803d">ssh · events (lossless)</text>

  <!-- same connector -->
  <line x1="336" y1="96" x2="484" y2="103" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="3 4" marker-end="url(#s)"/>
  <rect x="350" y="78" width="120" height="15" rx="3" fill="#fff"/>
  <text x="410" y="90" text-anchor="middle" font-size="8.8" font-weight="700" fill="#64748b">identical producer + fold</text>

  <!-- footnote -->
  <rect x="20" y="400" width="780" height="26" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.1" stroke-dasharray="5 4"/>
  <text x="410" y="417" text-anchor="middle" font-size="9.3" fill="#64748b">kolu seeds <tspan font-weight="700" fill="#475569">current</tspan> from its durable record either way, so the snapshot frame is the reconcile — one fold, two transports. Memory → <tspan font-weight="700" fill="#475569">kolu.authored</tspan>; awareness is HostObservation everywhere.</text>
</svg>
