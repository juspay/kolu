<svg viewBox="0 0 820 430" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a2bb8"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#15803d"/></marker>
    <marker id="s" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="410" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">One engine, two transports — local (R9.0) · remote (R9.3)</text>

  <!-- LOCAL -->
  <rect x="20" y="40" width="362" height="352" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="40" y="58" font-size="11.5" font-weight="700" fill="#64748b">LOCAL (R9.0) — kolu-server</text>

  <rect x="66" y="74" width="270" height="46" rx="9" fill="#fff6e8" stroke="#d98a1f" stroke-width="1.8"/>
  <text x="201" y="94" text-anchor="middle" font-size="12" font-weight="700" fill="#8a5a12">awareness engine — in-process</text>
  <text x="201" y="110" text-anchor="middle" font-size="9" font-style="italic" fill="#b07d2a">← kaval taps (local socket)</text>

  <rect x="66" y="150" width="270" height="40" rx="9" fill="#eafaf0" stroke="#15803d" stroke-width="1.7"/>
  <text x="201" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="#14663a">fold → entry.awareness</text>

  <rect x="66" y="218" width="270" height="40" rx="9" fill="#efebff" stroke="#5a3ff0" stroke-width="1.7"/>
  <text x="201" y="243" text-anchor="middle" font-size="11" font-weight="700" fill="#3a2bb8">registry entry.awareness</text>

  <rect x="66" y="300" width="270" height="44" rx="9" fill="#f4f1ff" stroke="#5a3ff0" stroke-width="1.5"/>
  <text x="201" y="321" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3a2bb8">browser</text>
  <text x="201" y="337" text-anchor="middle" font-size="9" fill="#352a7a">authored ⋈ awareness</text>

  <line x1="201" y1="120" x2="201" y2="150" stroke="#15803d" stroke-width="1.7" marker-end="url(#g)"/>
  <line x1="201" y1="190" x2="201" y2="218" stroke="#15803d" stroke-width="1.7" marker-end="url(#g)"/>
  <line x1="201" y1="258" x2="201" y2="300" stroke="#3a2bb8" stroke-width="1.6" marker-end="url(#b)"/>
  <text x="262" y="284" text-anchor="middle" font-size="8.6" fill="#3a2bb8">collection</text>

  <!-- REMOTE -->
  <rect x="438" y="40" width="362" height="352" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="780" y="58" text-anchor="end" font-size="11.5" font-weight="700" fill="#64748b">REMOTE (R9.3)</text>

  <text x="484" y="76" font-size="9.5" font-weight="700" fill="#8a5a12">pulam daemon (degenerate host)</text>
  <rect x="484" y="82" width="270" height="42" rx="9" fill="#fff6e8" stroke="#d98a1f" stroke-width="1.8"/>
  <text x="619" y="101" text-anchor="middle" font-size="12" font-weight="700" fill="#8a5a12">awareness engine — SAME</text>
  <text x="619" y="116" text-anchor="middle" font-size="9" font-style="italic" fill="#b07d2a">← remote kaval taps</text>

  <rect x="484" y="148" width="270" height="38" rx="9" fill="#eafaf0" stroke="#15803d" stroke-width="1.6"/>
  <text x="619" y="172" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14663a">fold → ephemeral cache</text>

  <rect x="484" y="206" width="270" height="36" rx="9" fill="#eef2f7" stroke="#64748b" stroke-width="1.6"/>
  <text x="619" y="229" text-anchor="middle" font-size="10.5" font-weight="700" fill="#334155">serve: whole AwarenessValues</text>

  <rect x="466" y="288" width="312" height="60" rx="9" fill="#efebff" stroke="#5a3ff0" stroke-width="1.7"/>
  <text x="622" y="309" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3a2bb8">kolu: mirror → reconcileRemoteSnapshot</text>
  <text x="622" y="326" text-anchor="middle" font-size="9.5" fill="#352a7a">→ fold → its own entry.awareness</text>
  <text x="622" y="341" text-anchor="middle" font-size="8.6" font-style="italic" fill="#6b5fd0">keeps memory the ephemeral daemon hasn't re-derived</text>

  <line x1="619" y1="124" x2="619" y2="148" stroke="#15803d" stroke-width="1.6" marker-end="url(#g)"/>
  <line x1="619" y1="186" x2="619" y2="206" stroke="#15803d" stroke-width="1.6" marker-end="url(#g)"/>
  <line x1="619" y1="242" x2="619" y2="288" stroke="#15803d" stroke-width="1.7" stroke-dasharray="5 3" marker-end="url(#g)"/>
  <rect x="588" y="258" width="118" height="16" rx="3" fill="#fff"/>
  <text x="647" y="270" text-anchor="middle" font-size="9" font-weight="700" fill="#15803d">ssh · after version gate</text>

  <!-- same-engine connector -->
  <line x1="336" y1="97" x2="484" y2="103" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="3 4" marker-end="url(#s)"/>
  <rect x="356" y="78" width="108" height="15" rx="3" fill="#fff"/>
  <text x="410" y="90" text-anchor="middle" font-size="8.8" font-weight="700" fill="#64748b">identical engine + fold</text>

  <!-- footnote -->
  <rect x="20" y="400" width="780" height="26" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.1" stroke-dasharray="5 4"/>
  <text x="410" y="417" text-anchor="middle" font-size="9.3" fill="#64748b">Same engine, same fold. Remote adds exactly <tspan font-weight="700" fill="#475569">one</tspan> reconcile-against-memory at connect; the reader-join (authored ⋈ awareness) is unchanged at the client in both.</text>
</svg>
