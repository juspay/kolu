<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 740" font-family="ui-sans-serif, system-ui, sans-serif" role="img" aria-label="A @kolu/surface (two shapes: fresh spec+handlers or a live odu socket) feeds the @kolu/surface-mcp adapter. The adapter splits into a framework-owned generic spine and a consumer-curated default-deny gate that fronts the MCP host.">
  <defs>
    <marker id="mseam-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#0D32B2"/>
    </marker>
    <marker id="mseam-arrow-gate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#B45309"/>
    </marker>
    <filter id="mseam-gateglow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#B45309" flood-opacity="0.30"/>
    </filter>
    <style>
      .source    { fill:#E3E9FD; stroke:#0D32B2; stroke-width:1.5; }
      .adapter   { fill:#F7F8FE; stroke:#0D32B2; stroke-width:1.5; }
      .spine     { fill:#EDF0FD; stroke:#0D32B2; stroke-width:1.5; }
      .leaf      { fill:#F7F8FE; stroke:#0D32B2; stroke-width:1; }
      .gate      { fill:#FBF1DC; stroke:#B45309; stroke-width:2.5; }
      .gateleaf  { fill:#FFFBF1; stroke:#B45309; stroke-width:1.25; }
      .host      { fill:#E6F4EA; stroke:#15803D; stroke-width:1.5; }
      .title     { fill:#0D32B2; font-weight:700; font-size:14px; }
      .titleamber{ fill:#92400E; font-weight:700; font-size:14px; }
      .titlegreen{ fill:#14532d; font-weight:700; font-size:14px; }
      .grouptitle{ fill:#0D32B2; font-weight:700; font-size:13px; }
      .gtamber   { fill:#92400E; font-weight:700; font-size:13px; }
      .leaftext  { fill:#11203a; font-size:12px; }
      .gateleaftext { fill:#7a4f00; font-size:12px; }
      .mono      { font-family:ui-monospace, "SF Mono", Menlo, monospace; }
      .sub       { fill:#4A5072; font-size:10.5px; }
      .gatesub   { fill:#92400E; font-size:10.5px; font-weight:700; }
      .edge      { stroke:#0D32B2; stroke-width:2; fill:none; }
      .edgegate  { stroke:#B45309; stroke-width:2.5; fill:none; }
      .edgelabel { fill:#0D32B2; font-size:11px; font-style:italic; }
      .edgelabelg{ fill:#92400E; font-size:11px; font-style:italic; }
      .ownbadge  { font-size:10px; font-weight:700; }
    </style>
  </defs>

  <!-- TIER 1: source surface — two shapes (bridge primary) -->
  <g>
    <rect class="source" x="160" y="20" width="320" height="124" rx="8"/>
    <text class="title" x="320" y="42" text-anchor="middle">a @kolu/surface — two shapes</text>
    <!-- bridge: primary shape (live socket) -->
    <rect class="leaf" x="180" y="56" width="280" height="38" rx="5"/>
    <text class="leaftext" x="320" y="74" text-anchor="middle">bridge a live surface <tspan class="sub">— primary</tspan></text>
    <text class="leaftext mono" x="320" y="89" text-anchor="middle" font-size="11px">odu's .ci/odu.sock</text>
    <!-- serve: thin composition -->
    <rect class="leaf" x="180" y="100" width="280" height="34" rx="5"/>
    <text class="leaftext" x="320" y="122" text-anchor="middle">serve a spec fresh — spec + handlers</text>
  </g>

  <!-- edge: source -> adapter -->
  <path class="edge" d="M320 144 L320 180" marker-end="url(#mseam-arrow)"/>
  <text class="edgelabel" x="330" y="166" text-anchor="start">bridge live  OR  serve fresh</text>

  <!-- TIER 2: adapter = generic spine (framework) + consumer gate -->
  <g>
    <rect class="adapter" x="36" y="182" width="568" height="420" rx="10"/>
    <text class="title" x="320" y="206" text-anchor="middle">@kolu/surface-mcp — shipped (#1270)</text>

    <!-- SPINE: framework-owned, generic (brand blue) -->
    <rect class="spine" x="56" y="218" width="528" height="184" rx="6"/>
    <rect x="56" y="218" width="6" height="184" fill="#0D32B2"/>
    <text class="grouptitle" x="76" y="240" text-anchor="start">generic spine</text>
    <text class="ownbadge" x="568" y="240" text-anchor="end" fill="#0D32B2">FRAMEWORK-OWNED</text>
    <rect class="leaf" x="74"  y="250" width="244" height="64" rx="5"/>
    <text class="leaftext" x="196" y="278" text-anchor="middle">primitive → resource / tool</text>
    <text class="sub" x="196" y="296" text-anchor="middle">the 1:1 map (the demo)</text>
    <rect class="leaf" x="322" y="250" width="244" height="64" rx="5"/>
    <text class="leaftext" x="444" y="278" text-anchor="middle">subscribe / teardown lifecycle</text>
    <text class="sub" x="444" y="296" text-anchor="middle">ResourcePusher — the month</text>
    <rect class="leaf" x="74"  y="322" width="244" height="64" rx="5"/>
    <text class="leaftext mono" x="196" y="350" text-anchor="middle" font-size="11.5px">zod → JSON-Schema</text>
    <text class="sub" x="196" y="368" text-anchor="middle">z.toJSONSchema() · 2020-12</text>
    <rect class="leaf" x="322" y="322" width="244" height="64" rx="5"/>
    <text class="leaftext" x="444" y="350" text-anchor="middle">stdout-is-the-protocol</text>
    <text class="sub" x="444" y="368" text-anchor="middle">via serveOverStdio discipline</text>

    <!-- GATE: consumer-curated, default-deny (amber, gate shape, emphasis) -->
    <!-- notched/gate shape: rounded rect with a top center notch + halo glow -->
    <g filter="url(#mseam-gateglow)">
      <path class="gate" d="M66 432 L294 432 L308 420 L322 432 L574 432
                            a8 8 0 0 1 8 8 L582 580 a8 8 0 0 1 -8 8
                            L74 588 a8 8 0 0 1 -8 -8 L66 440 a8 8 0 0 1 0 -8 Z"/>
    </g>
    <text class="gtamber" x="84" y="456" text-anchor="start">consumer gate</text>
    <text class="gatesub" x="84" y="472" text-anchor="start">DEFAULT-DENY — nothing reaches the agent unopted</text>
    <text class="ownbadge" x="566" y="456" text-anchor="end" fill="#92400E">CONSUMER-CURATED · not free</text>

    <rect class="gateleaf" x="80"  y="484" width="234" height="92" rx="5"/>
    <text class="gateleaftext" x="197" y="512" text-anchor="middle">expose · project</text>
    <text class="gateleaftext" x="197" y="530" text-anchor="middle">bespoke tools</text>
    <text class="gatesub" x="197" y="556" text-anchor="middle" font-weight="400" font-size="10.5px">surface the four good tools</text>
    <rect class="gateleaf" x="326" y="484" width="234" height="92" rx="5"/>
    <text class="gateleaftext" x="443" y="512" text-anchor="middle">guards ·</text>
    <text class="gateleaftext" x="443" y="530" text-anchor="middle">observer / mutator authz</text>
    <text class="gatesub" x="443" y="556" text-anchor="middle" font-weight="400" font-size="10.5px">keep the dangerous verb off the wire</text>
  </g>

  <!-- edge: gate -> host (amber: the gate decides what crosses) -->
  <path class="edgegate" d="M320 602 L320 658" marker-end="url(#mseam-arrow-gate)"/>
  <text class="edgelabelg" x="330" y="626" text-anchor="start">tools · resources · notifications/*</text>
  <text class="edgelabelg" x="330" y="642" text-anchor="start" font-size="10.5px">— only what the gate allows onto the wire</text>

  <!-- TIER 3: MCP host -->
  <g>
    <rect class="host" x="118" y="660" width="404" height="58" rx="8"/>
    <text class="titlegreen" x="320" y="685" text-anchor="middle">MCP host</text>
    <text class="leaftext" x="320" y="704" text-anchor="middle" fill="#166534">Claude · Codex · opencode · Gemini</text>
  </g>
</svg>
