<svg viewBox="0 0 800 470" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a2bb8"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#15803d"/></marker>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b06d12"/></marker>
    <marker id="s" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="400" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">S1 + S2 — local (R9.0): one-way, clobber-free</text>

  <!-- kaval taps -->
  <rect x="40" y="54" width="232" height="46" rx="9" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/>
  <text x="156" y="74" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">kaval taps</text>
  <text x="156" y="91" text-anchor="middle" font-size="9.5" fill="#475569">cwd · title · commandRun · foreground</text>

  <!-- seed -->
  <rect x="40" y="150" width="232" height="70" rx="9" fill="#efebff" stroke="#5a3ff0" stroke-width="1.6"/>
  <text x="156" y="171" text-anchor="middle" font-size="11.5" font-weight="700" fill="#3a2bb8">seed ← remembered</text>
  <text x="156" y="189" text-anchor="middle" font-size="9.5" fill="#352a7a">lastActivityAt · agentSession</text>
  <text x="156" y="205" text-anchor="middle" font-size="9.5" fill="#352a7a">· lastAgentCommand (sticky gates only)</text>

  <!-- engine -->
  <rect x="320" y="92" width="212" height="94" rx="10" fill="#fff6e8" stroke="#d98a1f" stroke-width="1.9"/>
  <text x="426" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#8a5a12">awareness engine</text>
  <text x="426" y="138" text-anchor="middle" font-size="10" fill="#7a4f10">PURE · owns its working state</text>
  <text x="426" y="155" text-anchor="middle" font-size="10" fill="#7a4f10">git→pr · agent×3 · foreground</text>
  <text x="426" y="173" text-anchor="middle" font-size="9" font-style="italic" fill="#b07d2a">no host record · no sink</text>

  <line x1="272" y1="79" x2="318" y2="116" stroke="#64748b" stroke-width="1.6" marker-end="url(#s)"/>
  <line x1="272" y1="182" x2="318" y2="152" stroke="#5a3ff0" stroke-width="1.6" marker-end="url(#b)"/>

  <!-- events legend -->
  <rect x="572" y="66" width="208" height="138" rx="9" fill="#fffdf6" stroke="#e7c98a" stroke-width="1.3"/>
  <text x="582" y="84" font-size="10.5" font-weight="700" fill="#8a5a12">emits AwarenessEvent</text>
  <text x="582" y="103" font-size="9.3" fill="#7a4f10">persisted {git} → fold + arm</text>
  <text x="582" y="120" font-size="9.3" fill="#7a4f10">live {agent} → fold (quiet)</text>
  <text x="582" y="137" font-size="9.3" fill="#7a4f10">persisted {lastActivityAt} *</text>
  <text x="592" y="152" font-size="8.6" font-style="italic" fill="#b07d2a">* only if a sticky gate fires</text>
  <text x="582" y="170" font-size="9.3" fill="#7a4f10">recentRepo · recentAgent</text>
  <text x="582" y="190" font-size="8.6" font-style="italic" fill="#b07d2a">(host MRU side-effects)</text>
  <line x1="532" y1="135" x2="570" y2="135" stroke="#b06d12" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- fold -->
  <rect x="320" y="240" width="212" height="52" rx="9" fill="#eafaf0" stroke="#15803d" stroke-width="1.7"/>
  <text x="426" y="261" text-anchor="middle" font-size="11.5" font-weight="700" fill="#14663a">host fold</text>
  <text x="426" y="279" text-anchor="middle" font-size="9.8" fill="#14663a">foldPatch(current, ev) → merge patch</text>
  <line x1="426" y1="186" x2="426" y2="240" stroke="#15803d" stroke-width="1.8" marker-end="url(#g)"/>
  <rect x="386" y="205" width="80" height="15" rx="3" fill="#fff"/>
  <text x="426" y="217" text-anchor="middle" font-size="9" font-weight="700" fill="#15803d">each event</text>

  <!-- registry -->
  <rect x="320" y="332" width="212" height="48" rx="9" fill="#efebff" stroke="#5a3ff0" stroke-width="1.7"/>
  <text x="426" y="353" text-anchor="middle" font-size="11.5" font-weight="700" fill="#3a2bb8">registry entry.awareness</text>
  <text x="426" y="370" text-anchor="middle" font-size="9.3" fill="#352a7a">the source of truth (wake · sleep · save read it)</text>
  <line x1="426" y1="292" x2="426" y2="332" stroke="#15803d" stroke-width="1.8" marker-end="url(#g)"/>
  <rect x="330" y="304" width="206" height="15" rx="3" fill="#fff"/>
  <text x="433" y="316" text-anchor="middle" font-size="8.8" font-weight="700" fill="#15803d">upsert · arm autosave iff persisted</text>

  <!-- browser -->
  <rect x="300" y="420" width="252" height="34" rx="8" fill="#f4f1ff" stroke="#5a3ff0" stroke-width="1.4"/>
  <text x="426" y="441" text-anchor="middle" font-size="10" font-weight="700" fill="#3a2bb8">browser — authored ⋈ awareness (unchanged)</text>
  <line x1="426" y1="380" x2="426" y2="420" stroke="#3a2bb8" stroke-width="1.6" marker-end="url(#b)"/>
  <rect x="358" y="392" width="136" height="15" rx="3" fill="#fff"/>
  <text x="426" y="404" text-anchor="middle" font-size="8.8" fill="#3a2bb8">served collection</text>

  <!-- memory-seeds-the-engine loop -->
  <path d="M320,356 L156,356 L156,222" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="3 4" marker-end="url(#s)"/>
  <rect x="120" y="262" width="120" height="15" rx="3" fill="#fff"/>
  <text x="180" y="274" text-anchor="middle" font-size="8.8" fill="#64748b">memory seeds the gates</text>

  <!-- clobber-free callout -->
  <rect x="572" y="240" width="208" height="140" rx="9" fill="#eafaf0" stroke="#86c9a4" stroke-width="1.3"/>
  <text x="582" y="260" font-size="10.5" font-weight="700" fill="#14663a">clobber-free, by two parts</text>
  <text x="582" y="279" font-size="9.2" fill="#14663a">• partial patch → an un-</text>
  <text x="592" y="293" font-size="9.2" fill="#14663a">emitted field is never written</text>
  <text x="582" y="311" font-size="9.2" fill="#14663a">  (remembered lastAgentCommand</text>
  <text x="592" y="325" font-size="9.2" fill="#14663a">  survives)</text>
  <text x="582" y="344" font-size="9.2" fill="#14663a">• seeded gates → recency</text>
  <text x="592" y="358" font-size="9.2" fill="#14663a">  not re-bumped on wake</text>
  <text x="582" y="374" font-size="8.6" font-style="italic" fill="#15803d">both required — neither alone</text>
</svg>
