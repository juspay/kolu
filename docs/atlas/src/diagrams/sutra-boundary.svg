<svg viewBox="0 0 760 566" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,sans-serif" role="img" aria-label="kolu-server and kolu-tui both embed @kolu/sutra; each embed is connected to one selected host and dials that host's kaval and pulam via surface-nix-host">
  <defs>
    <marker id="ts-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6470" />
    </marker>
    <marker id="ts-arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1b7a3a" />
    </marker>
  </defs>

  <!-- ── embedders (consumers), each with a host selector ── -->
  <g>
    <rect x="86" y="24" width="262" height="80" rx="11" fill="#dcf0f4" stroke="#0b6478" stroke-width="1.6" />
    <text x="217" y="52" text-anchor="middle" font-size="17" font-weight="700" fill="#0b3c49">kolu-server</text>
    <text x="217" y="71" text-anchor="middle" font-size="11" fill="#3a6470">embeds sutra · serves the web client</text>
    <rect x="150" y="80" width="134" height="18" rx="9" fill="#ffffff" stroke="#0b6478" stroke-width="1" />
    <text x="217" y="93" text-anchor="middle" font-size="10.5" fill="#0b3c49">◧ host: local ▾</text>

    <rect x="412" y="24" width="262" height="80" rx="11" fill="#dcf0f4" stroke="#0b6478" stroke-width="1.6" />
    <text x="543" y="52" text-anchor="middle" font-size="17" font-weight="700" fill="#0b3c49">kolu-tui</text>
    <text x="543" y="71" text-anchor="middle" font-size="11" fill="#3a6470">embeds sutra · remote-first · proves it</text>
    <rect x="476" y="80" width="134" height="18" rx="9" fill="#ffffff" stroke="#0b6478" stroke-width="1" />
    <text x="543" y="93" text-anchor="middle" font-size="10.5" fill="#7a3ca0">◧ host: nix@prod ▾</text>
  </g>

  <line x1="217" y1="104" x2="217" y2="150" stroke="#5b6470" stroke-width="1.6" marker-end="url(#ts-arrow)" />
  <line x1="543" y1="104" x2="543" y2="150" stroke="#5b6470" stroke-width="1.6" marker-end="url(#ts-arrow)" />
  <text x="380" y="128" text-anchor="middle" font-size="11.5" font-style="italic" fill="#5b6470">embed — own process, own state; connected to ONE selected host</text>

  <!-- ── sutra: the electricity, single-host ── -->
  <rect x="70" y="152" width="620" height="212" rx="15" fill="#e3f4e9" stroke="#1b7a3a" stroke-width="2.4" />
  <text x="380" y="184" text-anchor="middle" font-size="18" font-weight="800" fill="#15532a">@kolu/sutra</text>
  <text x="380" y="203" text-anchor="middle" font-size="11.5" fill="#2f6b41">the terminal-workflow electricity — scoped to ONE host per connection</text>

  <g font-size="11" fill="#1a4a2b">
    <rect x="96" y="220" width="270" height="60" rx="8" fill="#ffffff" stroke="#bce3c8" stroke-width="1.2" />
    <text x="231" y="244" text-anchor="middle" font-size="12.5" font-weight="700">Sealed single-host dispatch</text>
    <text x="231" y="263" text-anchor="middle">op(ptyId) · private endpoints → hard-pin</text>
    <text x="231" y="277" text-anchor="middle">local is a compile error</text>

    <rect x="394" y="220" width="270" height="60" rx="8" fill="#ffffff" stroke="#bce3c8" stroke-width="1.2" />
    <text x="529" y="244" text-anchor="middle" font-size="12.5" font-weight="700">Bare ptyId</text>
    <text x="529" y="263" text-anchor="middle">host is connection context, not a</text>
    <text x="529" y="277" text-anchor="middle">per-terminal id — no composite key</text>

    <rect x="96" y="288" width="270" height="60" rx="8" fill="#ffffff" stroke="#bce3c8" stroke-width="1.2" />
    <text x="231" y="312" text-anchor="middle" font-size="12.5" font-weight="700">Dial · reconnect · adoption</text>
    <text x="231" y="331" text-anchor="middle">connect the host's kaval + pulam ·</text>
    <text x="231" y="345" text-anchor="middle">survive the link · boot re-adopt</text>

    <rect x="394" y="288" width="270" height="60" rx="8" fill="#ffffff" stroke="#bce3c8" stroke-width="1.2" />
    <text x="529" y="312" text-anchor="middle" font-size="12.5" font-weight="700">Host-local session</text>
    <text x="529" y="331" text-anchor="middle">which terminals · sleeping · restore</text>
    <text x="529" y="345" text-anchor="middle">(kolu keeps the cross-host save)</text>
  </g>

  <line x1="180" y1="364" x2="180" y2="426" stroke="#1b7a3a" stroke-width="1.6" marker-end="url(#ts-arrow-green)" />
  <line x1="330" y1="364" x2="330" y2="426" stroke="#1b7a3a" stroke-width="1.6" marker-end="url(#ts-arrow-green)" />
  <line x1="480" y1="364" x2="480" y2="426" stroke="#1b7a3a" stroke-width="1.6" marker-end="url(#ts-arrow-green)" />
  <line x1="620" y1="364" x2="620" y2="426" stroke="#1b7a3a" stroke-width="1.6" marker-end="url(#ts-arrow-green)" />
  <text x="380" y="400" text-anchor="middle" font-size="11.5" font-style="italic" fill="#1b7a3a">dials the SELECTED host (a dropdown switches it) — arrow points OUT</text>

  <!-- ── the already-graduated electricity it stands on ── -->
  <g font-size="10.5" fill="#6b4a12">
    <rect x="70" y="428" width="150" height="76" rx="9" fill="#f8efd9" stroke="#c79a3e" stroke-width="1.5" />
    <text x="145" y="456" text-anchor="middle" font-size="13" font-weight="700" fill="#5b3d0a">kaval</text>
    <text x="145" y="476" text-anchor="middle">the host's PTY ·</text>
    <text x="145" y="490" text-anchor="middle">remote over ssh</text>

    <rect x="232" y="428" width="160" height="76" rx="9" fill="#f8efd9" stroke="#c79a3e" stroke-width="1.5" />
    <text x="312" y="456" text-anchor="middle" font-size="13" font-weight="700" fill="#5b3d0a">pulam</text>
    <text x="312" y="476" text-anchor="middle">the host's awareness +</text>
    <text x="312" y="490" text-anchor="middle">fs/git · one dial</text>

    <rect x="404" y="428" width="172" height="76" rx="9" fill="#f8efd9" stroke="#c79a3e" stroke-width="1.5" />
    <text x="490" y="456" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5b3d0a">@kolu/surface-nix-host</text>
    <text x="490" y="476" text-anchor="middle">getHostSession —</text>
    <text x="490" y="490" text-anchor="middle">the ssh / Nix dial</text>

    <rect x="588" y="428" width="102" height="76" rx="9" fill="#f8efd9" stroke="#c79a3e" stroke-width="1.5" />
    <text x="639" y="456" text-anchor="middle" font-size="13" font-weight="700" fill="#5b3d0a">@kolu/surface</text>
    <text x="639" y="476" text-anchor="middle">the mirror</text>
    <text x="639" y="490" text-anchor="middle">(R7 dual)</text>
  </g>

  <text x="380" y="534" text-anchor="middle" font-size="11" fill="#8a93a0">One host per connection; switch with the dropdown. The cross-host "which agent needs me everywhere" glance stays pulam-web's job.</text>
</svg>
