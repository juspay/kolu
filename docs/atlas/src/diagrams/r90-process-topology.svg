<svg viewBox="0 0 780 520" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3a2bb8"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#15803d"/></marker>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b06d12"/></marker>
    <marker id="s" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="390" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">after R9.0 — the LOCAL box · one pulam authority, every reader mirrors it</text>

  <!-- browser (kolu UI) -->
  <rect x="40" y="42" width="210" height="56" rx="9" fill="#f4f1ff" stroke="#5a3ff0" stroke-width="1.6"/>
  <text x="145" y="66" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3a2bb8">browser — kolu UI</text>
  <text x="145" y="84" text-anchor="middle" font-size="10.5" fill="#6b5fd0">Dock · canvas (reader-join)</text>

  <!-- pulam-web (optional dashboard) -->
  <rect x="530" y="42" width="210" height="56" rx="9" fill="#ffffff" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="635" y="63" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b">pulam-web (separate)</text>
  <text x="635" y="79" text-anchor="middle" font-size="9.5" fill="#94a3b8">fleet dashboard · keeps its OWN</text>
  <text x="635" y="91" text-anchor="middle" font-size="9.5" fill="#94a3b8">pulam (ssh) — converge later</text>

  <!-- kolu-server -->
  <rect x="190" y="170" width="400" height="98" rx="11" fill="#efebff" stroke="#5a3ff0" stroke-width="1.8"/>
  <text x="390" y="196" text-anchor="middle" font-size="14.5" font-weight="700" fill="#3a2bb8">kolu-server</text>
  <text x="390" y="216" text-anchor="middle" font-size="11" fill="#352a7a">registry · authored half · reader-join</text>
  <text x="390" y="233" text-anchor="middle" font-size="11" fill="#352a7a">awareness backing = <tspan font-weight="700">a mirror of the local pulam</tspan></text>
  <text x="390" y="253" text-anchor="middle" font-size="10" font-style="italic" fill="#6b5fd0">spawns + supervises kaval &amp; pulam (R2 adoptOrEnsure)</text>

  <!-- kaval -->
  <rect x="70" y="360" width="240" height="96" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.7"/>
  <text x="190" y="386" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">kaval  (daemon)</text>
  <text x="190" y="405" text-anchor="middle" font-size="10.5" fill="#475569">owns the PTYs · OSC 7 / 0;2 / 633;E taps</text>
  <text x="190" y="423" text-anchor="middle" font-size="10.5" fill="#475569">survives kolu-server restarts (R2)</text>
  <text x="190" y="443" text-anchor="middle" font-size="9.5" fill="#94a3b8">listens on a unix socket</text>

  <!-- local pulam -->
  <rect x="470" y="360" width="240" height="96" rx="10" fill="#fff6e8" stroke="#d98a1f" stroke-width="1.7"/>
  <text x="590" y="386" text-anchor="middle" font-size="14" font-weight="700" fill="#8a5a12">local pulam  (daemon, R4)</text>
  <text x="590" y="405" text-anchor="middle" font-size="10.5" fill="#7a4f10">the ONE sensor set (git · pr · agent)</text>
  <text x="590" y="423" text-anchor="middle" font-size="10.5" fill="#7a4f10">serves terminalWorkspace.awareness</text>
  <text x="590" y="443" text-anchor="middle" font-size="9.5" fill="#b07d2a">listens on a unix socket</text>

  <!-- browser <-> kolu-server : websocket -->
  <line x1="145" y1="98" x2="270" y2="168" stroke="#3a2bb8" stroke-width="1.7" marker-end="url(#b)"/>
  <line x1="270" y1="170" x2="150" y2="100" stroke="#3a2bb8" stroke-width="1.7" marker-end="url(#b)"/>
  <rect x="150" y="120" width="118" height="17" rx="3" fill="#fff"/>
  <text x="209" y="133" text-anchor="middle" font-size="10" font-weight="700" fill="#3a2bb8">websocket · /rpc/ws</text>

  <!-- pulam-web -> local pulam : DEFERRED convergence (R9-converge) -->
  <line x1="635" y1="98" x2="612" y2="358" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="2 5" marker-end="url(#s)"/>
  <text x="662" y="228" font-size="9.5" fill="#94a3b8" transform="rotate(90 662 228)">R9-converge (optional, later)</text>

  <!-- kolu-server -> kaval : unix socket (PTY) -->
  <line x1="300" y1="268" x2="210" y2="358" stroke="#3a2bb8" stroke-width="1.7" marker-end="url(#b)"/>
  <rect x="150" y="300" width="150" height="17" rx="3" fill="#fff"/>
  <text x="225" y="313" text-anchor="middle" font-size="10" font-weight="700" fill="#3a2bb8">unix socket · PTY I/O</text>

  <!-- kolu-server -> local pulam : unix socket (mirror awareness) -->
  <line x1="480" y1="268" x2="572" y2="358" stroke="#15803d" stroke-width="1.8" marker-end="url(#g)"/>
  <rect x="478" y="300" width="170" height="17" rx="3" fill="#fff"/>
  <text x="563" y="313" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">unix socket · mirror awareness</text>

  <!-- local pulam -> kaval : unix socket (read taps) -->
  <line x1="468" y1="430" x2="312" y2="430" stroke="#b06d12" stroke-width="1.7" marker-end="url(#a)"/>
  <rect x="312" y="455" width="156" height="17" rx="3" fill="#fff"/>
  <text x="390" y="468" text-anchor="middle" font-size="10" font-weight="700" fill="#b06d12">unix socket · read taps → run sensors</text>

  <!-- remote footnote -->
  <rect x="40" y="486" width="700" height="28" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.1" stroke-dasharray="5 4"/>
  <text x="390" y="504" text-anchor="middle" font-size="10" fill="#64748b"><tspan font-weight="700" fill="#475569">REMOTE (R9.3):</tspan> the remote host runs the SAME kaval + pulam (unix sockets between them); kolu-server reaches them over <tspan font-weight="700">ssh stdio</tspan> — local is a special case of remote.</text>
</svg>
