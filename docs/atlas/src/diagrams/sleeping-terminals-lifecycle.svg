<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 210" font-family="ui-sans-serif, system-ui, sans-serif" role="img" aria-label="One dormant-tile primitive with two producers. A planned tile carries intent only — a future — and activates into a live terminal by starting fresh. A live terminal sleeps into a sleeping tile — a saved record, a past — and wakes back to life by resuming its agent. Sleep ships now; planned tiles are the deferred future sibling.">
  <defs>
    <marker id="la" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5f6b80"/>
    </marker>
    <style>
      .plan  { fill:#FBF1DC; stroke:#B8860B; stroke-width:1.6; stroke-dasharray:6 4; }
      .live  { fill:#E3E9FD; stroke:#0D32B2; stroke-width:1.6; }
      .fold  { fill:#E7EEF4; stroke:#5b7088; stroke-width:1.6; }
      .t     { fill:#0A0F25; font-size:14px; font-weight:650; }
      .s     { fill:#5b6470; font-size:11.5px; }
      .e     { stroke:#5f6b80; stroke-width:1.7; fill:none; }
      .el    { fill:#27303f; font-size:11px; }
      .tense { font-size:11px; font-weight:700; }
    </style>
  </defs>

  <rect class="plan" x="34" y="64" width="176" height="76" rx="10"/>
  <text class="t" x="56" y="94">Planned tile</text>
  <text class="s" x="56" y="114">intent only</text>
  <text class="tense" x="56" y="158" fill="#B8860B">a future · deferred (#760)</text>

  <rect class="live" x="272" y="58" width="176" height="88" rx="10"/>
  <text class="t" x="296" y="92">Live terminal</text>
  <text class="s" x="296" y="112">PTY · agent · now</text>

  <rect class="fold" x="510" y="64" width="176" height="76" rx="10"/>
  <text class="t" x="534" y="94">Sleeping tile</text>
  <text class="s" x="534" y="114">saved record · ☾</text>
  <text class="tense" x="534" y="158" fill="#5b7088">a past · ships now</text>

  <path class="e" d="M210 102 L270 102" marker-end="url(#la)"/>
  <text class="el" x="206" y="46">activate · start fresh</text>

  <path class="e" d="M448 86 C 480 74, 482 74, 510 80" marker-end="url(#la)"/>
  <text class="el" x="452" y="60">sleep</text>
  <path class="e" d="M510 122 C 482 132, 480 132, 450 124" marker-end="url(#la)"/>
  <text class="el" x="448" y="150">wake · resume agent</text>
</svg>
