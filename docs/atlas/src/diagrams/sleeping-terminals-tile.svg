<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Today a tile is a live terminal: tileIds equal terminalIds, layout lives on terminal metadata, the active tile is the active terminal, and dock rows come from terminal ids — so a non-live tile has no home and gets bolted on as a silo. Proposed: a first-class Tile registry owns identity, layout, active/selection and MRU, plus a TileContent discriminated union whose only variant today is terminal; the live terminal list feeds the registry, and sleeping and planned become union variants, not silos. The canvas, dock and selection all read the one registry.">
  <defs>
    <marker id="t-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5f6b80"/>
    </marker>
    <marker id="t-arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1B7A3A"/>
    </marker>
    <style>
      .live  { fill:#E3E9FD; stroke:#0D32B2; stroke-width:1.5; }
      .tile  { fill:#E6F4EA; stroke:#1B7A3A; stroke-width:1.7; }
      .kind  { fill:#FBF1DC; stroke:#B8860B; stroke-width:1.5; }
      .silo  { fill:#FCEEEC; stroke:#C0392B; stroke-width:1.5; stroke-dasharray:5 3; }
      .h     { fill:#0A0F25; font-size:13.5px; font-weight:700; }
      .t     { fill:#0A0F25; font-size:13px; font-weight:650; }
      .s     { fill:#5b6470; font-size:11px; }
      .mono  { fill:#0A2A14; font-size:11.5px; font-weight:650; font-family:ui-monospace,monospace; }
      .e     { stroke:#5f6b80; stroke-width:1.5; fill:none; }
      .eG    { stroke:#1B7A3A; stroke-width:1.8; fill:none; }
      .el    { fill:#27303f; font-size:10.5px; }
      .red   { fill:#C0392B; font-size:11px; font-weight:650; }
      .grn   { fill:#1B7A3A; font-size:11px; font-weight:650; }
    </style>
  </defs>

  <line x1="500" y1="40" x2="500" y2="560" stroke="#cfd4dc" stroke-width="1.2" stroke-dasharray="3 4"/>

  <!-- LEFT: today -->
  <text class="h" x="40" y="32">Today — a tile IS a live terminal</text>
  <rect class="live" x="60" y="56" width="360" height="46" rx="8"/>
  <text class="t" x="78" y="78">terminalList (live)</text>
  <text class="s" x="78" y="94">server-driven on create / kill</text>

  <rect class="live" x="60" y="150" width="360" height="120" rx="8"/>
  <text class="t" x="78" y="174">Terminal</text>
  <text class="mono" x="78" y="196" fill="#0A0F25">canvasLayout</text><text class="s" x="190" y="196">← on TerminalMetadata</text>
  <text class="mono" x="78" y="216" fill="#0A0F25">activeId</text><text class="s" x="190" y="216">← a terminal id</text>
  <text class="mono" x="78" y="236" fill="#0A0F25">dock rank</text><text class="s" x="190" y="236">← from terminalIds</text>
  <text class="mono" x="78" y="256" fill="#0A0F25">PTY · xterm · agent</text>

  <path class="e" d="M240 102 L240 150" marker-end="url(#t-arr)"/>
  <rect fill="#fff" stroke="#9aa3b2" x="156" y="116" width="168" height="18" rx="4"/>
  <text class="el" x="164" y="129">tileIds === terminalIds</text>

  <rect class="silo" x="60" y="318" width="360" height="56" rx="8"/>
  <text class="red" x="78" y="342">A non-live tile has no home</text>
  <text class="s" x="78" y="360">→ sleeping bolted on as a parallel silo</text>
  <path class="e" d="M240 270 L240 318" marker-end="url(#t-arr)"/>

  <!-- RIGHT: proposed -->
  <text class="h" x="540" y="32">Proposed — Tile owns presence; Terminal is content</text>

  <rect class="tile" x="560" y="56" width="380" height="116" rx="8"/>
  <text class="t" x="580" y="80">Tile registry</text>
  <text class="mono" x="580" y="102">id · layout · activeId · MRU</text>
  <text class="mono" x="580" y="122">content: TileContent</text>
  <text class="s" x="580" y="144">the one source the canvas + dock + selection read —</text>
  <text class="s" x="580" y="160">content-agnostic; drag / resize / active never branch on kind</text>

  <rect class="kind" x="560" y="206" width="380" height="92" rx="8"/>
  <text class="t" x="580" y="228">TileContent — a discriminated union</text>
  <text class="mono" x="580" y="250" fill="#5a3a00">{ kind: "terminal", terminalId }</text><text class="grn" x="812" y="250">today</text>
  <text class="mono" x="580" y="270" fill="#5a3a00">{ kind: "sleeping", record }</text><text class="s" x="812" y="270">PR 2</text>
  <text class="mono" x="580" y="290" fill="#5a3a00">{ kind: "planned", intent }</text><text class="s" x="812" y="290">later</text>

  <rect class="live" x="560" y="330" width="380" height="58" rx="8"/>
  <text class="t" x="580" y="353">Terminal (liveness)</text>
  <text class="s" x="580" y="371">PTY · xterm · agent · attach stream — the content of a terminal tile</text>

  <path class="eG" d="M560 388 C 470 388, 470 130, 560 120" marker-end="url(#t-arrG)"/>
  <text class="grn" x="430" y="250" transform="rotate(-90 430 250)">live list FEEDS the registry</text>

  <!-- registry → consumers -->
  <rect class="tile" x="560" y="430" width="118" height="40" rx="7"/>
  <text class="t" x="578" y="455">Canvas</text>
  <rect class="tile" x="691" y="430" width="118" height="40" rx="7"/>
  <text class="t" x="709" y="455">Dock</text>
  <rect class="tile" x="822" y="430" width="118" height="40" rx="7"/>
  <text class="t" x="838" y="455">Selection</text>
  <path class="eG" d="M619 172 C 619 360, 619 400, 619 430" marker-end="url(#t-arrG)"/>
  <path class="eG" d="M700 172 C 740 360, 750 400, 750 430" marker-end="url(#t-arrG)"/>
  <path class="eG" d="M760 172 C 860 360, 881 400, 881 430" marker-end="url(#t-arrG)"/>
  <text class="grn" x="600" y="500">sleeping / planned = union variants, not silos · one read path</text>
</svg>
