<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 432" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect x="0.5" y="0.5" width="759" height="431" rx="14" fill="#15171c" stroke="#2a2e37"/>

  <!-- title -->
  <text x="40" y="36" fill="#c7ccd6" font-weight="650" font-size="16.5">Rename <tspan fill="#8b929d">intent</tspan> → <tspan fill="#6ea8e0">notes</tspan>, then add three surfaces</text>

  <!-- legend -->
  <rect x="486" y="25" width="15" height="11" rx="3" fill="none" stroke="#6cc070" stroke-width="1.4"/>
  <text x="506" y="35" fill="#8b929d" font-size="11.5">exists / reused</text>
  <rect x="622" y="25" width="15" height="11" rx="3" fill="none" stroke="#d6a35c" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="642" y="35" fill="#8b929d" font-size="11.5">this plan</text>

  <!-- hub: the renamed field -->
  <rect x="250" y="58" width="260" height="62" rx="12" fill="#182230" stroke="#6ea8e0" stroke-width="1.6"/>
  <text x="380" y="84" text-anchor="middle" fill="#cfe0f5" font-weight="650" font-size="14.5">notes — multiline markdown</text>
  <text x="380" y="103" text-anchor="middle" fill="#8b929d" font-size="10.5" font-family="ui-monospace, SFMono-Regular, monospace">renamed from intent · migrated in state.ts</text>

  <!-- spine + bus -->
  <line x1="380" y1="120" x2="380" y2="152" stroke="#3a4150" stroke-width="1.5"/>
  <line x1="200" y1="152" x2="560" y2="152" stroke="#3a4150" stroke-width="1.5"/>
  <line x1="200" y1="152" x2="200" y2="172" stroke="#3a4150" stroke-width="1.5"/>
  <line x1="560" y1="152" x2="560" y2="172" stroke="#3a4150" stroke-width="1.5"/>
  <path d="M194,166 L200,173 L206,166" fill="none" stroke="#3a4150" stroke-width="1.4"/>
  <path d="M554,166 L560,173 L566,166" fill="none" stroke="#3a4150" stroke-width="1.4"/>

  <!-- column headers -->
  <text x="44" y="186" fill="#6cc070" font-weight="650" font-size="12.5">● Already wired — reuse as-is</text>
  <text x="404" y="186" fill="#d6a35c" font-weight="650" font-size="12.5">▸ Add — three client surfaces</text>

  <!-- LEFT column: existing machinery (green, solid) -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="44" y="198" width="312" height="44" rx="9" fill="#161a20" stroke="#3f6b45" stroke-width="1"/>
    <text x="58" y="219" fill="#c7ccd6" font-weight="600" font-size="12">Persist + autosave</text>
    <text x="58" y="235" fill="#8b929d" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace">setNotes → updateClientMetadata → state.json</text>

    <rect x="44" y="252" width="312" height="44" rx="9" fill="#161a20" stroke="#3f6b45" stroke-width="1"/>
    <text x="58" y="273" fill="#c7ccd6" font-weight="600" font-size="12">Survives sleep &amp; restore</text>
    <text x="58" y="289" fill="#8b929d" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace">rides the persisted base through wakeMeta</text>

    <rect x="44" y="306" width="312" height="44" rx="9" fill="#161a20" stroke="#3f6b45" stroke-width="1"/>
    <text x="58" y="327" fill="#c7ccd6" font-weight="600" font-size="12">Markdown render</text>
    <text x="58" y="343" fill="#8b929d" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace">@kolu/solid-markdown · NotesBlock</text>

    <rect x="44" y="360" width="312" height="44" rx="9" fill="#161a20" stroke="#3f6b45" stroke-width="1"/>
    <text x="58" y="381" fill="#c7ccd6" font-weight="600" font-size="12">Shared NotesEditor</text>
    <text x="58" y="397" fill="#8b929d" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace">Edit / Preview sub-tabs · extracted once</text>
  </g>

  <!-- RIGHT column: new surfaces (amber, dashed) -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="404" y="198" width="312" height="62" rx="9" fill="#1d1a14" stroke="#7a5e34" stroke-width="1.1" stroke-dasharray="4 3"/>
    <text x="418" y="219" fill="#e8c98f" font-weight="600" font-size="12.5">Notes tab (inline editor)</text>
    <text x="418" y="237" fill="#c7ccd6" font-size="10.5" font-family="ui-monospace, SFMono-Regular, monospace">RightPanel.tsx + NotesPanel.tsx</text>
    <text x="418" y="252" fill="#8b929d" font-size="10.5">always-visible · debounced autosave</text>

    <rect x="404" y="272" width="312" height="62" rx="9" fill="#1d1a14" stroke="#7a5e34" stroke-width="1.1" stroke-dasharray="4 3"/>
    <text x="418" y="293" fill="#e8c98f" font-weight="600" font-size="12.5">Close-dialog reminder</text>
    <text x="418" y="311" fill="#c7ccd6" font-size="10.5" font-family="ui-monospace, SFMono-Regular, monospace">CloseConfirm.tsx</text>
    <text x="418" y="326" fill="#8b929d" font-size="10.5">read-only, from the frozen snapshot</text>

    <rect x="404" y="346" width="312" height="62" rx="9" fill="#1d1a14" stroke="#7a5e34" stroke-width="1.1" stroke-dasharray="4 3"/>
    <text x="418" y="367" fill="#e8c98f" font-weight="600" font-size="12.5">Title-bar note icon</text>
    <text x="418" y="385" fill="#c7ccd6" font-size="10.5" font-family="ui-monospace, SFMono-Regular, monospace">TileTitleActions.tsx</text>
    <text x="418" y="400" fill="#8b929d" font-size="10.5">body-gated → opens the Notes tab</text>
  </g>
</svg>
