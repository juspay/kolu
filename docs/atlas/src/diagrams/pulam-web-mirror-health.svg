<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="ah-green" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#15803d"/></marker>
    <marker id="ah-dim" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
    <marker id="ah-red" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/></marker>
    <marker id="ah-violet" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
  </defs>

  <!-- title -->
  <text x="390" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">pulam-web is a 3-tier bridge — only tier-1 health reaches the browser</text>

  <!-- tiers -->
  <g>
    <rect x="24" y="70" width="180" height="92" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="114" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">browser</text>
    <text x="114" y="120" text-anchor="middle" font-size="11" fill="#475569">SolidJS · surfaceClient</text>
    <text x="114" y="137" text-anchor="middle" font-size="11" fill="#475569">renders the host card</text>

    <rect x="300" y="70" width="180" height="92" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="390" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">pulam-web backend</text>
    <text x="390" y="120" text-anchor="middle" font-size="11" fill="#475569">re-serves the surface</text>
    <text x="390" y="137" text-anchor="middle" font-size="11" fill="#475569">owns the HostSession</text>

    <rect x="576" y="70" width="180" height="92" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="666" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">remote pulam</text>
    <text x="666" y="120" text-anchor="middle" font-size="11" fill="#475569">the real terminals</text>
    <text x="666" y="137" text-anchor="middle" font-size="11" fill="#475569">over ssh / stdio</text>
  </g>

  <!-- transport arrows -->
  <line x1="204" y1="116" x2="296" y2="116" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah-dim)"/>
  <line x1="296" y1="128" x2="204" y2="128" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah-dim)"/>
  <text x="250" y="108" text-anchor="middle" font-size="10" fill="#475569">ws</text>
  <line x1="480" y1="116" x2="572" y2="116" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah-dim)"/>
  <line x1="572" y1="128" x2="480" y2="128" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah-dim)"/>
  <text x="528" y="108" text-anchor="middle" font-size="10" fill="#475569">ssh stdio</text>

  <!-- TIER 1 health: socket status, surfaced today -->
  <rect x="24" y="196" width="456" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <circle cx="44" cy="216" r="5" fill="#16a34a"/>
  <text x="58" y="213" font-size="11" font-weight="700" fill="#15803d">tier-1 health — browser↔backend socket</text>
  <text x="58" y="228" font-size="10.5" fill="#475569">connectSurface status (connecting · live · reconnecting · down) — ✓ already surfaced</text>

  <!-- TIER 2 health: the gap -->
  <rect x="300" y="266" width="456" height="50" rx="8" fill="#fef2f2" stroke="#fecaca"/>
  <text x="320" y="287" font-size="11" font-weight="700" fill="#b91c1c">tier-2 health — backend↔remote mirror (HostSession.onState)</text>
  <text x="320" y="303" font-size="10.5" fill="#475569">copying → connecting → connected → disconnected → failed (+ failureCause, progressLines)</text>

  <!-- onState lives at the backend -->
  <line x1="390" y1="162" x2="390" y2="264" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ah-red)"/>

  <!-- THE LIE: today this never reaches the browser -->
  <path d="M300 291 C 150 291, 114 250, 114 168" fill="none" stroke="#dc2626" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ah-red)"/>
  <text x="150" y="270" font-size="10.5" font-weight="700" fill="#b91c1c">TODAY: never crosses to the browser</text>
  <text x="150" y="284" font-size="10" fill="#b91c1c">→ a dead mirror paints green + “no terminals”</text>

  <!-- THE FIX -->
  <path d="M320 276 C 220 235, 150 210, 120 172" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#ah-violet)"/>
  <text x="232" y="200" font-size="10.5" font-weight="700" fill="#6d28d9">FIX: a `connection` cell</text>
  <text x="232" y="214" font-size="10" fill="#6d28d9">parent writes session.onState → browser gates on it</text>

  <text x="390" y="350" text-anchor="middle" font-size="10.5" fill="#475569">drishti already does this (its reference shape); pulam-web is the lone consumer that never plugged in.</text>
  <text x="390" y="368" text-anchor="middle" font-size="10.5" fill="#475569">The two health channels stay SEPARATE — conflating socket status with mirror health is the bug.</text>
</svg>
