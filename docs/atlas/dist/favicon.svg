<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="the kolu Atlas">
  <!-- The Atlas mark: a confident "A" built as a small knowledge graph — its
       legs are edges, its terminals are linked nodes, and the amber apex is the
       north-star hub the whole structure hangs from. -->
  <g fill="none" stroke="#1a1c20" stroke-width="5.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M32 15.5 L16.5 49.5" />
    <path d="M32 15.5 L47.5 49.5" />
  </g>
  <path d="M22 35 L42 35" fill="none" stroke="#3f444b" stroke-width="3.8" stroke-linecap="round" />
  <circle cx="16.5" cy="49.5" r="5.8" fill="#1a1c20" stroke="#f6f7f9" stroke-width="2.6" />
  <circle cx="47.5" cy="49.5" r="5.8" fill="#1a1c20" stroke="#f6f7f9" stroke-width="2.6" />
  <circle cx="32" cy="35" r="4.2" fill="#3f444b" stroke="#f6f7f9" stroke-width="2.2" />
  <circle cx="32" cy="15.5" r="6.6" fill="#b4690e" stroke="#f6f7f9" stroke-width="2.6" />
</svg>
